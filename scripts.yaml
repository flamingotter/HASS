activate_alexa_actionable_notification:
  alias: activate_alexa_actionable_notification
  description: Activates an actionable notification on a specific echo device
  fields:
    text:
      description: The text you would like alexa to speak.
      example: What would you like the thermostat set to?
    event_id:
      description: Correlation ID for event responses
      example: ask_for_temperature
    alexa_device:
      description: Alexa device you want to trigger
      example: media_player.office_dot
    suppress_confirmation:
      description: Set true if you want to suppress 'okay' confirmation
      example: 'true'
  sequence:
  - data:
      entity_id: input_text.alexa_actionable_notification
      value: '{"text": "{{ text }}", "event": "{{ event_id }}", "suppress_confirmation":
        "{{ suppress_confirmation }}"}'
    action: input_text.set_value
  - data:
      entity_id: '{{ alexa_device }}'
      media_content_type: skill
      media_content_id: amzn1.ask.skill.c2564a56-c75d-451e-9a04-6349756d92c9
    action: media_player.play_media
  mode: single
activate_mobile_actionable_notification:
  alias: activate_mobile_actionable_notification
  description: Activates an actionable notification on a mobile device
  fields:
    notify_target:
      description: The mobile device(s) that you want to target the notification
      example: notify.all_devices
    title:
      description: The text you would like in the notification title.
      example: Feed the Pets
    message:
      description: The text you would like in the notification message.
      example: It is time to feed the Cats
    id:
      description: The unquie id of you choice
      example: An unquie id for a message
    notify_tag:
      description: The notification tag used to thread the messages
      example: pets-notify
    notify_action_1:
      description: Notification actions
      example: feed_done, feed_ignore, feed_passon, etc...
    notify_action_1_title:
      description: Notification actions
      example: Done, Ignore, Ask Other, etc...
    notify_action_2:
      description: Notification actions
      example: feed_done, feed_ignore, feed_passon, etc...
    notify_action_2_title:
      description: Notification actions
      example: Done, Ignore, Ask Other, etc...
    notify_action_3:
      description: Notification actions
      example: feed_done, feed_ignore, feed_passon, etc...
    notify_action_3_title:
      description: Notification actions
      example: Done, Ignore, Ask Other, etc...
    ttl:
      description: time to live
    priority:
      description: Priority level
    color:
      description: color of notification
    channel:
      description: Use 'alarm_stream' to give audible alert even if on silent
  variables:
    device: 123
  sequence:
  - action: '{{ notify_target }}'
    data:
      message: '{{ message }}'
      title: '{{ title }}'
      data:
        tag: '{{ notify_tag }}'
        ttl: '{{ ttl }}'
        importance: '{{ importance }}'
        color: '{{ color }}'
        channel: '{{ channel }}'
        actions:
        - action: '{{ notify_action_1 }}'
          title: '{{ notify_action_1_title }}'
        - action: '{{ notify_action_2 }}'
          title: '{{ notify_action_2_title }}'
  mode: single
genai_response_to_actionable_notification:
  alias: GenAI Response to Actionable Notification
  fields:
    msg_target:
      description: The Name of the user the the message is targeting
      example: Josh
    msg_prompt:
      description: This prompt that is sent to gen ai to return the message.
      example: Josh
  variables:
    targets:
      Josh: notify.mobile_app_josh_mobile
      MJ: notify.mobile_app_mj_pixel_8_pro
  sequence:
  - action: ai_task.generate_data
    continue_on_error: true
    data:
      prompt: 'Rewrite this in a creative way prompting {{ msg_target }} to do the
        task, limit to about 35 words: The cats are not going away. They still need
        to be fed.'
    response_variable: generated_content
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - action: script.activate_mobile_actionable_notification
    data:
      notify_target: '{{ targets.get(msg_target, ''unknown'') }}'
      title: test message
      message: '{{ (generated_content | default({})).text | default(''The cats are
        not going away. They still need to be fed.'') }}'
      notify_tag: test_tag
      notify_action_1: done
      notify_action_1_title: Done
      notify_action_2: pass
      notify_action_2_title: Pass
  description: ''
