update_kitchen_zen35_leds:
  alias: Update Kitchen ZEN35 LEDs
  mode: restart
  sequence:
  - delay: 00:00:01
  - variables:
      dim_threshold: 230
      light_state_big: '{{ states(''light.big_kitchen_lights'') }}'
      light_brightness_big: '{{ state_attr(''light.big_kitchen_lights'', ''brightness'')
        | int(0) }}'
      light_state_island: '{{ states(''light.island'') }}'
      light_brightness_island: '{{ state_attr(''light.island'', ''brightness'') |
        int(0) }}'
  - variables:
      led_mode_big: "{% if light_state_big == 'off' or light_brightness_big < dim_threshold
        %}\n  Always on\n{% else %}\n  Always off\n{% endif %}\n"
      led_color_big: '{% if light_state_big == ''off'' %} White {% else %} Blue {%
        endif %}

        '
      led_mode_island: "{% if light_state_island == 'off' or light_brightness_island
        < dim_threshold %}\n  Always on\n{% else %}\n  Always off\n{% endif %}\n"
      led_color_island: '{% if light_state_island == ''off'' %} White {% else %} Blue
        {% endif %}

        '
  - action: select.select_option
    target:
      entity_id:
      - select.kitchen_controller_01_led_indicator_relay
      - select.kitchen_controller_02_led_indicator_relay
      - select.kitchen_controller_03_led_indicator_relay
    data:
      option: '{{ led_mode_big }}'
  - action: select.select_option
    target:
      entity_id:
      - select.kitchen_controller_01_led_indicator_button_1
      - select.kitchen_controller_02_led_indicator_button_1
      - select.kitchen_controller_03_led_indicator_button_1
    data:
      option: '{{ led_mode_island }}'
  - delay: 00:00:01
  - if:
    - condition: template
      value_template: '{{ led_mode_big == ''Always on'' }}'
    then:
    - action: select.select_option
      target:
        entity_id:
        - select.kitchen_controller_01_led_indicator_color_relay
        - select.kitchen_controller_02_led_indicator_color_relay
        - select.kitchen_controller_03_led_indicator_color_relay
      data:
        option: '{{ led_color_big }}'
  - if:
    - condition: template
      value_template: '{{ led_mode_island == ''Always on'' }}'
    then:
    - action: select.select_option
      target:
        entity_id:
        - select.kitchen_controller_01_led_indicator_color_button_1
        - select.kitchen_controller_02_led_indicator_color_button_1
        - select.kitchen_controller_03_led_indicator_color_button_1
      data:
        option: '{{ led_color_island }}'
bedtime_charging_check:
  alias: Bedtime Charging Check
  sequence:
  - variables:
      devices_not_charging: []
      non_charging_states_list:
      - not_charging
      - discharging
  - if:
    - condition: state
      entity_id: person.josh
      state: home
    - condition: template
      value_template: '{{ states(''sensor.josh_mobile_battery_state'') in non_charging_states_list
        }}

        '
    then:
    - variables:
        devices_not_charging: '{{ devices_not_charging + [''Josh\''s phone''] }}'
  - if:
    - condition: state
      entity_id: person.josh
      state: home
    - condition: template
      value_template: '{{ states(''sensor.pixel_watch_2_battery_state'') in non_charging_states_list
        }}

        '
    then:
    - variables:
        devices_not_charging: '{{ devices_not_charging + [''Josh\''s watch''] }}'
    enabled: false
  - if:
    - condition: state
      entity_id: person.mj
      state: home
    - condition: template
      value_template: '{{ states(''sensor.mj_pixel_8_pro_battery_state'') in non_charging_states_list
        }}

        '
    then:
    - variables:
        devices_not_charging: '{{ devices_not_charging + [''MJ\''s phone''] }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ devices_not_charging | length > 0 }}'
      sequence:
      - variables:
          list_items: '{{ devices_not_charging | map(''lower'') | list }}'
          last_item: '{{ list_items | last }}'
          all_but_last: '{{ list_items[:-1] }}'
          list_string: "{% if list_items | length == 1 %}\n  {{ list_items[0] }}\n{%
            else %}\n  {{ all_but_last | join(', ') }}{% if all_but_last | length
            > 0 %}, and {% endif %}{{ last_item }}\n{% endif %}\n"
          message: 'It looks like {{ list_string }} {{ "is not" if devices_not_charging
            | length == 1 else "are not" }} charging. Please plug them in.

            '
      - data:
          message: '{{ message }}'
          target: media_player.bedroom
          data:
            type: tts
        action: notify.alexa_media
        continue_on_error: true
      - wait_for_trigger:
        - entity_id:
          - sensor.josh_mobile_battery_state
          - sensor.mj_pixel_8_pro_battery_state
          - sensor.pixel_watch_2_battery_state
          to:
          - charging
          trigger: state
        timeout: 00:01:00
        continue_on_timeout: true
  description: ''
fix_zooz_smart_bulb_mode:
  alias: 'Recovery: Zooz Smart Bulb Relay Fix'
  icon: mdi:power-restore
  mode: single
  sequence:
  - repeat:
      for_each:
      - entity: light.dining_switch_01
      - entity: light.dining_switch_02
      sequence:
      - target:
          entity_id: '{{ repeat.item.entity }}'
        data:
          parameter: 11
          value: 1
        action: zwave_js.set_config_parameter
      - target:
          entity_id: '{{ repeat.item.entity }}'
        action: switch.turn_on
      - delay: 00:00:02
      - target:
          entity_id: '{{ repeat.item.entity }}'
        data:
          parameter: 11
          value: 2
        action: zwave_js.set_config_parameter
welcome_home_ai_debrief:
  alias: Welcome Home AI Debrief
  mode: single
  sequence:
  - delay:
      seconds: 15
  - action: ai_task.generate_data
    continue_on_error: true
    data:
      instructions: "{% set josh_home = states('input_select.josh_status') in ['Home',
        'Just Arrived'] %} {% set mj_home = states('input_select.mj_status') in ['Home',
        'Just Arrived'] %} {% set is_vacation = states('alarm_control_panel.home_alarm')
        == 'armed_vacation' %} {% set time_of_day = 'evening' if is_state('sun.sun',
        'below_horizon') else 'daytime' %}\n{% if josh_home and mj_home %}\n  {% set
        person = \"Josh and MJ\" %}\n{% elif josh_home %}\n  {% set person = \"Josh\"
        %}\n{% elif mj_home %}\n  {% set person = \"MJ\" %}\n{% else %}\n  {% set
        person = \"the Devines (Derrick and Gia)\" %}\n{% endif %}\n{% set visitor_status
        = \"A visitor or delivery was detected at the front door while the house was
        empty.\" if is_state('input_boolean.porch_visitor_while_away', 'on') else
        \"\" %}\n{# This picks a random way to refer to the pets to keep it fresh
        #} {% set cat_prompt = [\n  \"Include a cute observation about one specific
        cat chosen from: Battle Cat (he/him), Josie(she/her), or Custard(she/her).\",\n
        \ \"Include a funny observation about two of their cats choose two from: Battle
        Cat (he/him), Josie(she/her), or Custard(she/her).\",\n  \"Include a brief,
        chaotic update on all three cats: Battle Cat (he/him), Josie(she/her), or
        Custard(she/her).\",\n  \"Refer to the cats generally as 'the cats' or 'the
        felines' without using their specific names.\"\n] | random %}\nWrite a short,
        creative {{ time_of_day }} welcome home message for {{ person }}.  {% if is_vacation
        %}Mention they are returning from a long trip and the Home is secure.{% endif
        %} {{ cat_prompt }} {{ visitor_status }}  Limit the entire response to 35
        words."
      task_name: Generate Welcome Message
    response_variable: ai_greeting
  - wait_template: '{{ is_state(''binary_sensor.motion_indoors_kitchen'', ''on'')
      }}'
    continue_on_timeout: true
    timeout: 00:15:00
  - action: media_player.volume_set
    continue_on_error: true
    data:
      volume_level: 0.5
    target:
      entity_id: media_player.counter
  - action: notify.alexa_media_counter
    continue_on_error: true
    data:
      message: '{{ (ai_greeting | default({})).data | default(''Welcome home! The
        house is secure and the cats are waiting for you.'') }}'
      target: media_player.counter
  - delay:
      hours: 0
      minutes: 0
      seconds: 15
      milliseconds: 0
  - action: media_player.volume_set
    continue_on_error: true
    data:
      volume_level: 0.3
    target:
      entity_id: media_player.counter
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.porch_visitor_while_away
  description: ''
system_log_maintenance_task:
  alias: 'System: Log Maintenance Task'
  sequence:
  - if:
    - condition: template
      value_template: '{{ timer_entity is defined and timer_entity != none }}'
    then:
    - action: timer.start
      target:
        entity_id: '{{ timer_entity }}'
  - variables:
      friendly_name: >
        {% if task_name is defined and task_name != none %}
          {{ task_name }}
        {% elif timer_entity is defined %}
          {{ state_attr(timer_entity, 'friendly_name') | replace('Maintenance ', '') | replace(' Timer', '') }}
        {% else %}
          Unknown Task
        {% endif %}
  - action: notify.send_message
    target:
      entity_id: notify.maintenance_log_csv
    data:
      message: '"{{ now().strftime(''%Y-%m-%d'') }}","{{ now().strftime(''%H:%M:%S'')
        }}","{{ friendly_name }}","COMPLETED"'
  - action: notify.mobile_app_josh_mobile
    data:
      title: Log Updated
      message: Maintenance for {{ friendly_name }} has been logged.
      data:
        tag: '{{ (friendly_name | lower | replace('' '', ''-'')) }}-reminder'
log_generator_test:
  alias: Log Generator Test
