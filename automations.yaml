        motion_clear: binary_sensor.patio_left_person_detected
      binary_sensor.driveway_outside_person_detected:
        switch: switch.garage_spot_light
        motion_clear: binary_sensor.driveway_outside_person_detected
      binary_sensor.driveway_ptz_person_detected:
        switch:
        - switch.garage_spot_light
        - switch.front_yard_lights
        motion_clear: binary_sensor.driveway_ptz_person_detected
  mode: parallel
  max: 10
- id: '1772728212323'
  alias: 'Security: Front Porch - AI Video Analysis (v1.3)'
  description: 'v1.3: Context-aware identity check. increased snapshot delays +1 sec'
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_porch_ptz_person_detected
    to: 'on'
  - trigger: state
    entity_id: input_button.test_porch_ai
  conditions:
  - condition: state
    entity_id: input_boolean.camera_alerts
    state: 'on'
  - condition: template
    value_template: '{# Increase cooldown to 10 minutes (600s) to save quota #} {{
      this.attributes.last_triggered == None or (now() - this.attributes.last_triggered).total_seconds()
      > 600 }}

      '
  actions:
  - parallel:
    - action: camera.record
      target:
        entity_id: camera.front_ptz_medium_resolution_channel
      data:
        duration: 12
        lookback: 3
        filename: /media/snapshots/porch/approach.mp4
    - sequence:
      - delay:
          seconds: 1
      - action: camera.snapshot
        target:
          entity_id: camera.doorbell_outside_medium_resolution_channel
        data:
          filename: /media/snapshots/porch/doorbell_t0.jpg
      - delay:
          seconds: 2
      - action: camera.snapshot
        target:
          entity_id: camera.doorbell_outside_medium_resolution_channel
        data:
          filename: /media/snapshots/porch/doorbell_t1.jpg
      - delay:
          hours: 0
          minutes: 0
          seconds: 3
          milliseconds: 0
      - action: camera.snapshot
        target:
          entity_id: camera.doorbell_outside_medium_resolution_channel
        data:
          filename: /media/snapshots/porch/doorbell_t3.jpg
  - action: ai_task.generate_data
    data:
      entity_id: ai_task.google_ai_task
      task_name: Porch Video Analysis
      instructions: 'Attachment 1 and 2 are reference photos of the residents, MJ
        and Josh. Attachment 3 is a video from the porch PTZ. Attachments 4, 5, and
        6 are sequential snapshots from the doorbell (T=0s, T=1s, T=3s). If there
        is a vehicle parked in the driveway (upper right of the frame) in Attachment
        3, use that to determine the delivery service (Amazon, UPS, USPS, Fedex, etc)
        if it is a normal passenger vehicle or unmarked truck/van ignore it. Compare
        the person in the footage to the reference photos.


        CRITICAL LOGIC:

        Residents do not deliver packages or wear delivery uniforms. If the person
        leaves a package, takes a photo of a package, or is wearing a delivery uniform
        (Amazon, UPS, FedEx, USPS), they are NEVER a resident, regardless of physical
        resemblance.


        Visual Marker for Josh: Be advised that Josh often wears a large straw-type
        hat when doing yard work, which may partially obscure his face in the reference
        photos.


        RULE 1: If the person is a visual match for Josh or MJ (or matches the Josh
        visual marker: straw hat, work clothes, no package) AND does not leave a package,
        start your response with: [RESIDENT]


        RULE 2: If the person is a guest who is let inside the house or walks through
        the front door, start your response with: [ENTERED]


        RULE 3: For all other visitors, deliveries, or solicitors, start your response
        with: [ALERT]


        OUTPUT FORMAT: Provide a SINGLE LINE response. No bullet points, no newlines,
        no markdown. Format: [TAG] Person: [Details]. Action: [What they did]. Intent:
        [Delivery/Visitor/Resident].'
      attachments:
      - media_content_id: media-source://media_source/local/snapshots/reference/mj.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/reference/josh.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/porch/approach.mp4
        media_content_type: video/mp4
      - media_content_id: media-source://media_source/local/snapshots/porch/doorbell_t0.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/porch/doorbell_t1.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/porch/doorbell_t3.jpg
        media_content_type: image/jpeg
    response_variable: gemini_report
    continue_on_error: true
  - action: notify.send_message
    target:
      entity_id: notify.daily_camera_log
    data:
      message: '{{ now().strftime(''%I:%M %p'') }} - Front Porch: {{ (gemini_report
        | default({})).data | default(''[ALERT] Video analysis failed.'') }}'
  - action: notify.send_message
    target:
      entity_id:
      - notify.porch_history
    data:
      message: '{% set report = (gemini_report | default({})).data | default(''[ALERT]
        Video analysis failed.'') %} {% set tag = report.split('']'')[0] ~ '']'' if
        '']'' in report else ''[ERROR]'' %} {% set content = report.replace(tag, '''').strip()
        %} "{{ now().strftime(''%Y-%m-%d'') }}","{{ now().strftime(''%H:%M:%S'') }}","{{
        tag }}","{{ content | replace(''"'', ''""'') }}"

        '
  - if:
    - condition: template
      value_template: '{{ ''[ALERT]'' in (gemini_report | default({})).data | default(''[ALERT]'')
        }}'
    then:
    - action: notify.persistent_notification
      data:
        title: Porch Intel (Full Report)
        message: '{% set report = (gemini_report | default({})).data | default('''')
          %} {% set tag = report.split('']'')[0] ~ '']'' if '']'' in report else ''[ALERT]''
          %} {{ report.replace(tag, '''').strip() }}

          '
    - action: notify.mobile_app_josh_mobile
      data:
        title: Porch Intel
        message: '{% set report = (gemini_report | default({})).data | default(''Video
          analysis failed.'') %} {% set tag = report.split('']'')[0] ~ '']'' if '']''
          in report else ''[ALERT]'' %} {{ report.replace(tag, '''').strip() | truncate(150,
          true, ''...'') }}

          '
    - if:
      - condition: state
        entity_id: alarm_control_panel.home_alarm
        state:
        - armed_away
        - armed_vacation
      then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.porch_visitor_while_away
  mode: single
