- id: person_status_synchronizer
  alias: 'Person: Status Synchronizer'
  description: Unified engine for person status transitions (Home, Just Arrived, Just
    Left, Away, Extended Away).
  variables:
    person_map:
      person.josh: input_select.josh_status
      input_select.josh_status: input_select.josh_status
      person.mj: input_select.mj_status
      input_select.mj_status: input_select.mj_status
  trigger:
  - platform: state
    entity_id:
    - person.josh
    - person.mj
    to: home
    id: device_tracker_home
  - platform: state
    entity_id:
    - person.josh
    - person.mj
    from: home
    id: device_tracker_not_home
  - platform: state
    entity_id:
    - input_select.josh_status
    - input_select.mj_status
    to: Just Arrived
    for:
      minutes: 3
    id: input_select_wait_arrived
  - platform: state
    entity_id:
    - input_select.josh_status
    - input_select.mj_status
    from: Just Left
    to: Just Arrived
    id: input_select_debounce
  - platform: state
    entity_id:
    - input_select.josh_status
    - input_select.mj_status
    to: Just Left
    for:
      minutes: 3
    id: input_select_wait_left
  - platform: state
    entity_id:
    - input_select.josh_status
    - input_select.mj_status
    to: Away
    for:
      hours: 24
    id: input_select_wait_away
  - platform: numeric_state
    entity_id:
    - sensor.home_josh_distance
    - sensor.home_mj_distance
    above: 2640000
    id: distance_away
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != trigger.from_state.state }}'
  action:
  - variables:
      target_select: '{{ person_map[trigger.entity_id] }}'
  - choose:
    - conditions:
      - condition: trigger
        id: device_tracker_home
      - condition: template
        value_template: '{{ is_state(target_select, ''Just Left'') }}'
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ target_select }}'
        data:
          option: Home
    - conditions:
      - condition: trigger
        id: device_tracker_home
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ target_select }}'
        data:
          option: Just Arrived
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: input_select_wait_arrived
        - condition: trigger
          id: input_select_debounce
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ target_select }}'
        data:
          option: Home
    - conditions:
      - condition: trigger
        id: device_tracker_not_home
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ target_select }}'
        data:
          option: Just Left
    - conditions:
      - condition: trigger
        id: input_select_wait_left
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ target_select }}'
        data:
          option: Away
    - conditions:
      - condition: trigger
        id: distance_away
      sequence:
      - action: input_select.select_option
        target:
          entity_id: '{{ ''input_select.josh_status'' if trigger.entity_id == ''sensor.home_josh_distance''
            else ''input_select.mj_status'' }}'
        data:
          option: Extended Away
    default:
    - condition: trigger
      id: input_select_wait_away
    - action: input_select.select_option
      target:
        entity_id: '{{ target_select }}'
      data:
        option: Extended Away
  mode: queued
