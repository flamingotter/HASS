- id: '1723755616026'
  alias: Cleaning
  description: ''
  triggers:
  - entity_id:
    - input_boolean.cleaning
    to: 'on'
    id: t01
    trigger: state
  - entity_id:
    - input_boolean.cleaning
    to: 'off'
    id: t02
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - alias: Create scene, then turn on ALL lights
        sequence:
        - data:
            scene_id: cleaning_before
            snapshot_entities:
            - light.eugene
            - light.rapunzel
            - light.wled_bed
            - light.dining
            - light.desk_light
            - light.office_lamp
            - light.office_one
            - light.office_two
            - light.office_three
            - light.office_four
            - light.table_lamp
            - light.piano_lamp
            - light.garage_overhead
            - light.garage_cabinet_lights
            - light.spot_light
            - light.stair_light
            - light.media_one
            - light.media_two
            - light.media_three
            - light.media_four
            - light.storage_01
            - light.storage_02
          action: scene.create
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - action: homeassistant.turn_on
          metadata: {}
          target:
            label_id: cleaning_light
          data:
            brightness_pct: 100
            kelvin: 4500
      - sequence:
        - delay:
            hours: 1
            minutes: 0
            seconds: 0
            milliseconds: 0
        - if:
          - condition: state
            entity_id: input_boolean.cleaning
            state: 'on'
          then:
          - data:
              message: Cleaning Mode Still Needed?
              title: Cleaning
              data:
                tag: cleaning-warning
                actions:
                - action: cleaning_off
                  title: 'Off'
                - action: cleaning_snooze
                  title: Snooze 30min
            action: notify.all_devices
    - conditions:
      - condition: trigger
        id:
        - t02
      sequence:
      - sequence:
        - target:
            entity_id: scene.cleaning_before
          action: scene.turn_on
        - delay:
            hours: 0
            minutes: 0
            seconds: 5
            milliseconds: 0
        - sequence:
          - action: scene.create
            data:
              scene_id: last_alexa_volume
              snapshot_entities:
              - '{{ states.sensor.last_alexa.state }}'
          - action: media_player.volume_set
            data:
              volume_level: 0.5
            target:
              entity_id:
              - '{{ states.sensor.last_alexa.state }}'
          - data:
              message: '{{ ["Good fuck ing Job you glorious Mother fuck er!", "The
                House Looks fucking marvelous!", "Holy Shit it! This is one clean
                house.", "Holy Shit it! This is one fuck er fucking really fuck ing
                clean house.", "You are the fucking bomb dot com"] | random }}'
              target: '{{ states.sensor.last_alexa.state }}'
            enabled: true
            action: notify.alexa_media
          - action: scene.turn_on
            target:
              entity_id: scene.last_alexa_volume
  mode: restart
- id: '1724262570606'
  alias: Alarm panel functions and mode actions
  description: ''
  triggers:
  - entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed
    to: disarmed
    trigger: state
  - alias: When Home Alarm changes from Armed Night to Disarmed
    entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed from armed night
    to: disarmed
    from: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed night
    to: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed
    to: armed_home
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed away
    to: armed_away
    trigger: state
  - entity_id:
    - input_select.josh_status
    - input_select.mj_status
    id: person status
    alias: person status
    trigger: state
  - at: 08:00:00
    id: 0800
    alias: 0800
    trigger: time
  - trigger: state
    entity_id:
    - timer.timer_garage_spotlight
    to:
    - idle
    from:
    - active
    id: Spotlight Timer Complete
    alias: Spotlight Timer Complete
  - trigger: event
    event_type: zwave_js_notification
    event_data:
      device_id: 621aa1c4c9243ca0eb0bb5c81174a2c6
      command_class: 113
      type: 6
      event: 5
    id: garage_door_locked
    alias: When Garage Door is Locked
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - person status
      sequence:
      - choose:
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: Josh is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.josh_status
              state: Home
          - condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Work
            alias: MJ is in an Away State
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: Josh has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: Josh Disarmed
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: MJ is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.mj_status
              state: Home
          - alias: Josh is in an Away State
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.josh_status
              state: Work
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: MJ has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: MJ Disarmed
        - conditions:
          - condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            alias: Away / Away
          sequence:
          - if:
            - condition: state
              entity_id: input_boolean.house_guests
              state: 'on'
            then:
            - action: notify.mobile_app_josh_mobile
              data:
                message: Set home to Armed Away with House Guests?
                title: Arm Away Verify
                data:
                  tag: arm-guests
                  actions:
                  - action: guests_arm
                    title: Arm
                  - action: guests_ignore
                    title: Ignore
            else:
            - action: alarm_control_panel.alarm_arm_away
              target:
                entity_id: alarm_control_panel.home_alarm
          alias: Away / Away
        - conditions:
          - alias: Ext Away / Ext Away
            condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
          sequence:
          - action: alarm_control_panel.alarm_arm_vacation
            target:
              entity_id: alarm_control_panel.home_alarm
          - action: notify.mobile_app_josh_mobile
            data:
              title: Armed Vacation / Eco Mode
              message: Home is set to Armed Vacation. Eco Mode Activated. Set number
                of days until return to normal.
              data:
                tag: eco-activate
                actions:
                - action: REPLY
                  title: Set Days to Normal
                - action: eco-ignore
                  title: Ignore
          alias: Armed Vacation
      alias: When triggered by person status, set alarm panel mode.
    - conditions:
      - condition: trigger
        id:
        - armed away
      sequence:
      - parallel:
        - action: lock.lock
          target:
            entity_id: lock.door_locks
        - action: light.turn_off
          target:
            entity_id:
            - light.lights
            - light.bedroom
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.reading_mode
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.camera_alerts
        - action: notify.mobile_app_josh_mobile
          data:
            title: Armed Away
            message: Both Josh and MJ are Away!
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - disarmed
        - condition: template
          value_template: '{{ trigger.from_state.state != "armed_night" }}'
      alias: When triggered by disarmed
      sequence:
      - action: script.turn_on
        target:
          entity_id:
          - script.welcome_home_ai_debrief
        data: {}
      - parallel:
        - action: switch.turn_on
          target:
            entity_id: switch.garage_spot_light
        - action: timer.start
          data:
            duration: 00:05:00
          target:
            entity_id: timer.timer_garage_spotlight
    - conditions:
      - condition: trigger
        id:
        - 0800
      sequence:
      - action: media_player.volume_set
        data:
          volume_level: 0.3
        target:
          entity_id:
          - media_player.babe_cave
          - media_player.counter
          - media_player.dining_room
    - conditions:
      - condition: trigger
        id:
        - Spotlight Timer Complete
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.garage_spot_light
    - conditions:
      - condition: trigger
        id:
        - garage_door_locked
      - condition: state
        entity_id: input_select.josh_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: input_select.mj_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: alarm_control_panel.home_alarm
        state: disarmed
      sequence:
      - if:
        - condition: state
          entity_id: input_select.josh_status
          state: Extended Away
        - condition: state
          entity_id: input_select.mj_status
          state: Extended Away
        then:
        - action: alarm_control_panel.alarm_arm_vacation
          target:
            entity_id: alarm_control_panel.home_alarm
        else:
        - action: alarm_control_panel.alarm_arm_away
          target:
            entity_id: alarm_control_panel.home_alarm
      - action: notify.mobile_app_josh_mobile
        data:
          title: "\U0001F512 House Secured"
          message: The garage man door was locked and the alarm has re-armed based
            on your current status.
      alias: Sitter Departs / Smart Re-Arm
  mode: parallel
  max: 15
