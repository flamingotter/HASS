  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - shuttle-bay
      sequence:
      - if:
        - condition: state
          entity_id: cover.shuttle_bay
          state: open
        then:
        - action: timer.start
          data:
            duration: 00:05:00
          target:
            entity_id: timer.timer_garage_door
        else:
        - if:
          - condition: state
            entity_id: cover.shuttle_bay
            state: closed
          then:
          - action: timer.cancel
            data: {}
            target:
              entity_id: timer.timer_garage_door
      alias: shuttle_bay
    - conditions:
      - condition: trigger
        id:
        - timer_finished
      - condition: state
        entity_id: cover.shuttle_bay
        state: open
      sequence:
      - action: notify.mobile_app_josh_mobile
        data:
          title: Garage Door
          message: Garage Door 01 Open
          data:
            tag: garage-warning_01
            actions:
            - action: close_garage_01
              title: Close
            - action: ignore_garage_01
              title: Ignore
      alias: timer_finished
    - conditions:
      - condition: trigger
        id:
        - close_garage_01
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.shuttle_bay
        data: {}
      - action: notify.all_devices
        data:
          title: Garage Door
          message: Garage Door 01 Closing
          data:
            tag: garage-warning_01
      alias: close_garage_01
    - conditions:
      - condition: trigger
        id:
        - ignore_garage_01
      sequence:
      - action: timer.start
        data:
          duration: 01:00:00
        target:
          entity_id: timer.timer_garage_door
      - action: notify.all_devices
        data:
          title: Garage Door
          message: Garage Door 01 Ignored. Reminding in 1 hour
          data:
            tag: garage-warning_01
      alias: ignore_garage_01
    - conditions:
      - condition: trigger
        id:
        - cleared
      sequence:
      - variables:
          device_id: '{{ trigger.event.data.device_id }}'
          cleared: true
      - action: system_log.write
        data:
          level: warning
          message: device id= "{{ device_id }}" and cleared= "{{ cleared }}"
  mode: single
