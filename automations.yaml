- id: '1766015428765'
  alias: 'Light Control: Dining Room (v2.0)'
  description: Instant LIFX control for two Zooz ZEN74 switches with Double Tap and
    Dimming
  triggers:
  - event_type: zwave_js_value_notification
    event_data:
      property_key: '001'
    id: top
    trigger: event
  - event_type: zwave_js_value_notification
    event_data:
      property_key: '002'
    id: bottom
    trigger: event
  actions:
  - condition: template
    value_template: "{{ trigger.event.data.device_id in [\n  'c125586b93f269297aa55b3247f9d054',\n
      \ '961b9d5943f96a6021fbf5392265d48c'\n] }}\n"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyPressed2x'' and trigger.id
          == ''top'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.dining
        data:
          brightness_pct: 100
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyPressed2x'' and trigger.id
          == ''bottom'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.dining
        data:
          brightness_pct: 50
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyPressed'' and trigger.id
          == ''top'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.dining
        data:
          brightness_pct: 100
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyPressed'' and trigger.id
          == ''bottom'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.dining
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyHeldDown'' and trigger.id
          == ''top'' }}'
      sequence:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining
            data:
              brightness_step_pct: 10
          - delay: '00:00:00.3'
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyHeldDown'' and trigger.id
          == ''bottom'' }}'
      sequence:
      - repeat:
          while:
          - condition: template
            value_template: '{{ true }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.dining
            data:
              brightness_step_pct: -10
          - delay: '00:00:00.3'
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == ''KeyReleased'' }}'
      sequence:
      - stop: Button released
  mode: restart
- id: '1772286703556'
