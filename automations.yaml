- id: '1726254835466'
  alias: 'Person: Josh Status Update'
  description: ''
  trigger:
  - platform: state
    entity_id: person.josh
    to: home
    id: device_tracker_home
  - platform: state
    entity_id: input_select.josh_status
    for:
      minutes: 3
    id: input_select_wait_arrived
    to: Just Arrived
  - platform: state
    entity_id: input_select.josh_status
    from: Just Left
    to: Just Arrived
    id: input_select_debounce
  - platform: state
    entity_id: person.josh
    from: home
    id: device_tracker_not_home
  - platform: state
    entity_id: input_select.josh_status
    to: Just Left
    for:
      minutes: 3
    id: input_select_wait_left
  - platform: state
    entity_id: input_select.josh_status
    to: Away
    for:
      hours: 24
    id: input_select_wait_away
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != trigger.from_state.state }}'
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: device_tracker_home
      - condition: state
        entity_id: input_select.josh_status
        state: Just Left
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Home
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: device_tracker_home
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Just Arrived
        action: input_select.select_option
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: input_select_wait_arrived
        - condition: trigger
          id: input_select_debounce
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Home
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: device_tracker_not_home
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Just Left
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: input_select_wait_left
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Away
        action: input_select.select_option
    default:
    - condition: trigger
      id: input_select_wait_away
    - target:
        entity_id: input_select.josh_status
      data:
        option: Extended Away
      action: input_select.select_option
  mode: queued
