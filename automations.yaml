- id: '1775070658742'
  alias: 'Climate: Master Bedroom Sleep Comfort Engine (v2.2)'
  description: Optimized mesh traffic, threshold-based release, and fixed daytime
    manual override.
  triggers:
  - entity_id: sensor.bedroom_sensor_air_temperature
    trigger: state
  - entity_id: input_number.bedroom_target_temperature
    trigger: state
  - at: '22:30:00'
    id: bedtime
    trigger: time
  - at: 07:00:00
    id: morning
    trigger: time
  - entity_id: input_boolean.eco_mode
    to: 'off'
    id: eco_deactivated
    trigger: state
  actions:
  - variables:
      actual: '{{ states(''sensor.bedroom_sensor_air_temperature'') | float(68) }}'
      user_target: '{{ states(''input_number.bedroom_target_temperature'') | float(63)
        }}'
      t6_target: '{{ state_attr(''climate.t6_pro_downstairs'', ''temperature'') |
        float(68) }}'
      is_sleep_time: '{{ (now().hour == 22 and now().minute >= 30) or (now().hour
        > 22) or (now().hour < 7) }}'
      eco_active: '{{ is_state(''input_boolean.eco_mode'', ''on'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ eco_active }}'
      sequence:
      - stop: Eco Mode Active. Automation suspended.
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: morning
        - condition: template
          value_template: '{{ trigger.id == ''eco_deactivated'' and not is_sleep_time
            }}'
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: 68
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: bedtime
        - condition: template
          value_template: '{{ trigger.id == ''eco_deactivated'' and is_sleep_time
            }}'
      sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.bedroom_target_temperature
        data:
          value: 63
    - conditions:
      - condition: template
        value_template: '{{ is_sleep_time }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ actual > (user_target + 0.5) and t6_target != 60 }}'
          sequence:
          - action: climate.set_temperature
            target:
              entity_id: climate.t6_pro_downstairs
            data:
              temperature: 60
        - conditions:
          - condition: template
            value_template: '{{ actual < (user_target - 0.5) and t6_target != 72 }}'
          sequence:
          - action: climate.set_temperature
            target:
              entity_id: climate.t6_pro_downstairs
            data:
              temperature: 72
        - conditions:
          - condition: template
            value_template: "{{ (actual <= user_target and t6_target == 60) or \n
              \  (actual >= user_target and t6_target == 72) }}\n"
          sequence:
          - action: climate.set_temperature
            target:
              entity_id: climate.t6_pro_downstairs
            data:
              temperature: '{{ user_target }}'
  mode: restart
