- id: '1717273577381'
  alias: Reading Mode
  description: ''
  trigger:
  - platform: tag
    tag_id: reading_mode
  condition: []
  action:
  - action: input_boolean.toggle
    target:
      entity_id: input_boolean.reading_mode
  mode: single
- id: '1717271382609'
  alias: Outdoor Timelapse
  description: ''
  triggers:
  - hours: /1
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  actions:
  - repeat:
      for_each:
      - camera.driveway_outside_high_resolution_channel
      - camera.patio_left_high_resolution_channel
      - camera.doorbell_outside_high_resolution_channel
      - camera.front_porch_ptz_high_resolution_channel
      sequence:
      - action: camera.snapshot
        data:
          entity_id: '{{ repeat.item }}'
          filename: /media/timelapse/{{ repeat.item.split('.')[1] }}/{{ repeat.item.split('.')[1]
            }}_{{ now().strftime('%Y%m%d_%H%M') }}.jpg
  mode: single
- id: '1717271470147'
  alias: 'System: NFC Tag Manager'
  description: Unified engine for processing physical NFC tags (Garage, Mower, etc.)
  triggers:
  - trigger: tag
    tag_id: cam_alerts
  - trigger: tag
    tag_id: garage
  conditions:
  - condition: template
    value_template: '{{ config is not none }}'
  actions:
  - action: '{{ config.action }}'
    target:
      entity_id: '{{ config.entity }}'
  - action: notify.mobile_app_josh_mobile
    data:
      title: NFC Tag Scanned
      message: '{{ scanned_id | replace("_", " ") | title }} has been toggled.'
      data:
        tag: nfc-tag-notification
  mode: single
  variables:
    tag_map:
      garage:
        action: cover.toggle
        entity: cover.shuttle_bay
      cam_alerts:
        action: input_boolean.toggle
        entity: input_boolean.camera_alerts
    scanned_id: "{% if trigger.tag_id is defined %}\n  {{ trigger.tag_id }}\n{% else
      %}\n  {{ trigger.event.data.tag_id }}\n{% endif %}\n"
    config: '{{ tag_map.get(scanned_id|trim) }}'
- id: '1717274816399'
  alias: On Air
  description: ''
  triggers:
  - entity_id:
    - input_boolean.onair
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.onair
      state: 'on'
    then:
    - action: scene.create
      data:
        scene_id: before_onair
        snapshot_entities:
        - light.office_light
        - light.spot_light
    - delay:
        seconds: 1
    - parallel:
      - data:
          name: red
        action: frontend.set_theme
      - action: light.turn_on
        data:
          rgb_color:
          - 255
          - 0
          - 0
          brightness_pct: 100
        target:
          entity_id:
          - light.spot_light
    else:
    - parallel:
      - data:
          name: clear
        action: frontend.set_theme
      - action: scene.turn_on
        data: {}
        target:
          entity_id: scene.before_onair
  mode: single
- id: '1717275482675'
  alias: 'Office Scene '
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_select.office_scene_select
  condition: []
  action:
  - action: scene.turn_on
    data:
      entity_id: scene.{{trigger.to_state.state}}
      transition: 2
  mode: single
- id: '1717276452552'
  alias: MBR Bedtime
  description: Two-stage bedtime process controlled by Alarm State.
  triggers:
  - tag_id: bedtime_01
    trigger: tag
  - entity_id:
    - input_boolean.bedtime
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    then:
    - sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.home_alarm
        data: {}
      - action: lock.lock
        enabled: true
        target:
          entity_id: lock.garage_man_lock
      - if:
        - condition: state
          entity_id: input_boolean.trash_reminder
          state:
          - 'on'
        then:
        - data:
            message: It looks like you may have forgotten to take the trash to the
              street.
            target: media_player.bedroom
            data:
              type: tts
          action: notify.alexa_media
        alias: Check Trash Reminder
      - if:
        - condition: state
          entity_id: input_boolean.holiday_mode
          state:
          - 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.led_tree
        alias: Holiday mode actions
      - if:
        - condition: state
          entity_id: climate.t6_pro_downstairs
          state:
          - heat
        then:
        - action: switch.turn_on
          metadata: {}
          target:
            entity_id: switch.bedroom_humidifier
          data: {}
        alias: Thermostat set to Heat actions
      - action: homeassistant.turn_off
        metadata: {}
        target:
          label_id: bedtime_off
        data: {}
      - action: homeassistant.turn_on
        metadata: {}
        target:
          label_id: bedtime_on
        data: {}
    else:
    - action: script.bedtime_charging_check
    - target:
        device_id: 8781654d992a7a4701cbec887fab30d9
      action: media_player.turn_off
    - target:
        entity_id:
        - light.eugene
        - light.rapunzel
      action: light.turn_off
      data: {}
    - data:
        media:
          media_content_id: bedtime
          media_content_type: routine
      action: media_player.play_media
      target:
        device_id:
        - 66288267303a20ddbebaff9c0666d31d
    - target:
        entity_id: switch.noise_machines
      action: switch.turn_on
    - target:
        entity_id: input_boolean.bedtime
      action: input_boolean.turn_off
  mode: single
- id: '1720447716098'
  alias: Set Theme
  description: Set theme base on sun.sun state
  trigger:
  - platform: homeassistant
    event: start
  - platform: state
    entity_id:
    - sun.sun
    to: above_horizon
  - platform: state
    entity_id:
    - sun.sun
    to: below_horizon
  condition: []
  action:
  - if:
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    then:
    - data:
        name: clear
      action: frontend.set_theme
    else:
    - data:
        name: clear-dark
      action: frontend.set_theme
  mode: single
- id: '1720737172368'
  alias: MBR Wakeup
  description: ''
  triggers:
  - entity_id:
    - input_boolean.wake_up
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - sequence:
    - action: alarm_control_panel.alarm_disarm
      data:
        code: '1977'
      target:
        entity_id: alarm_control_panel.home_alarm
    - target:
        entity_id: input_boolean.wake_up
      action: input_boolean.turn_off
    - action: switch.turn_off
      target:
        entity_id:
        - switch.bedroom_sleep_mode
        - switch.bedroom_humidifier
  mode: parallel
  max: 10
- id: '1723572617932'
  alias: 3D Printer ON/OFF
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'on'
    id: t01
    for:
      hours: 0
      minutes: 0
      seconds: 1
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: power off
  - platform: state
    entity_id:
    - input_boolean.3dprinter_safety
    to: 'off'
    id: t03
    enabled: true
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - target:
          entity_id: switch.office_strip_socket_06
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id:
        - power off
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.3dprinter_safety
          state: 'off'
          for:
            hours: 0
            minutes: 0
            seconds: 0
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.office_strip_socket_06
        else:
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_power
    - conditions:
      - condition: trigger
        id:
        - t03
      sequence:
      - sequence:
        - delay:
            hours: 0
            minutes: 0
            seconds: 10
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_safety
  mode: parallel
  max: 10
- id: '1723652703682'
  alias: 3D Print Progress Notify
  description: ''
  triggers:
  - type: value
    device_id: 0b448651aeaffe49b475efc775e33180
    entity_id: 3932439c9f1b67fca8fca111146559f3
    domain: sensor
    above: 49
    id: t01
    trigger: device
  - device_id: 0b448651aeaffe49b475efc775e33180
    domain: bambu_lab
    type: event_print_finished
    id: t02
    trigger: device
  conditions:
  - condition: sun
    before: sunset
    after: sunrise
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - data:
          message: 3D print is fifty percent complete
          target: media_player.counter
        action: notify.alexa_media
      - data:
          title: 50% Complete
          message: Print is at 50%
        action: notify.mobile_app_josh_mobile
    - conditions:
      - condition: trigger
        id:
        - t02
      sequence:
      - data:
          message: Pardon the interuption, your 3D print has finished
          target: media_player.counter
        action: notify.alexa_media
      - data:
          message: Print has been finished
          title: 3D Print Complete
        action: notify.mobile_app_josh_mobile
  mode: single
- id: '1723653511884'
  alias: 3D Print Chamber Fan
  description: ''
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    below: 64
    id: t01
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 65
    below: 75
    id: t02
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 76
    below: 85
    id: t03
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 86
    below: 95
    id: t04
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 96
    below: 105
    id: t05
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 106
    id: t06
  - platform: state
    entity_id:
    - sensor.bambu_p1s_current_stage
    id: t07
    from:
    to: idle
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 30
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t02
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 40
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t03
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 50
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t04
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 70
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t05
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 80
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t06
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 100
        target:
          entity_id: fan.bambu_p1s_chamber_fan
      alias: Chamber Fan 100% > 106°F
    - conditions:
      - condition: trigger
        id:
        - t07
      sequence:
      - action: fan.set_percentage
        data:
          percentage: 0
        target:
          entity_id: fan.bambu_p1s_chamber_fan
      alias: Turn off Chamber Fan when Idle
  mode: single
- id: '1723666205062'
  alias: 3D Print Chamber Light
  description: ''
  trigger:
  - platform: state
    entity_id:
    - sensor.bambu_p1s_current_stage
    from:
    to: printing
    id: t01
  - platform: state
    entity_id:
    - sensor.bambu_p1s_current_stage
    from:
    to: idle
    id: t02
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.bambu_p1s_chamber_light
      alias: Turn on Chamber Light
    - conditions:
      - condition: trigger
        id:
        - t02
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.bambu_p1s_chamber_light
      alias: Turn off Chamber Light
  mode: single
- id: '1724262570606'
  alias: Alarm panel functions and mode actions
  description: ''
  triggers:
  - entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed
    to: disarmed
    trigger: state
  - alias: When Home Alarm changes from Armed Night to Disarmed
    entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed from armed night
    to: disarmed
    from: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed night
    to: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed
    to: armed_home
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed away
    to: armed_away
    trigger: state
  - entity_id:
    - input_select.josh_status
    - input_select.mj_status
    id: person status
    alias: person status
    trigger: state
  - at: 08:00:00
    id: 0800
    alias: 0800
    trigger: time
  - trigger: state
    entity_id:
    - timer.timer_garage_spotlight
    to:
    - idle
    from:
    - active
    id: Spotlight Timer Complete
    alias: Spotlight Timer Complete
  - trigger: event
    event_type: zwave_js_notification
    event_data:
      device_id: 621aa1c4c9243ca0eb0bb5c81174a2c6
      command_class: 113
      type: 6
      event: 5
    id: garage_door_locked
    alias: When Garage Door is Locked
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - person status
      sequence:
      - choose:
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: Josh is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.josh_status
              state: Home
          - condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Work
            alias: MJ is in an Away State
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: Josh has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: Josh Disarmed
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: MJ is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.mj_status
              state: Home
          - alias: Josh is in an Away State
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.josh_status
              state: Work
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: MJ has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: MJ Disarmed
        - conditions:
          - condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            alias: Away / Away
          sequence:
          - if:
            - condition: state
              entity_id: input_boolean.house_guests
              state: 'on'
            then:
            - action: notify.mobile_app_josh_mobile
              data:
                message: Set home to Armed Away with House Guests?
                title: Arm Away Verify
                data:
                  tag: arm-guests
                  actions:
                  - action: guests_arm
                    title: Arm
                  - action: guests_ignore
                    title: Ignore
            else:
            - action: alarm_control_panel.alarm_arm_away
              target:
                entity_id: alarm_control_panel.home_alarm
          alias: Away / Away
        - conditions:
          - alias: Ext Away / Ext Away
            condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
          sequence:
          - action: alarm_control_panel.alarm_arm_vacation
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: Armed Vacation
      alias: When triggered by person status, set alarm panel mode.
    - conditions:
      - condition: trigger
        id:
        - armed away
      sequence:
      - parallel:
        - action: lock.lock
          target:
            entity_id: lock.door_locks
        - action: light.turn_off
          target:
            entity_id:
            - light.lights
            - light.bedroom
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.reading_mode
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.camera_alerts
        - action: notify.mobile_app_josh_mobile
          data:
            title: Armed Away
            message: Both Josh and MJ are Away!
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - disarmed
        - condition: template
          value_template: '{{ trigger.from_state.state != "armed_night" }}'
      alias: When triggered by disarmed
      sequence:
      - action: script.turn_on
        target:
          entity_id:
          - script.welcome_home_ai_debrief
        data: {}
      - parallel:
        - if:
          - condition: state
            entity_id: sun.sun
            state: below_horizon
          then:
          - action: switch.turn_on
            target:
              entity_id: switch.garage_spot_light
        - action: timer.start
          data:
            duration: 00:05:00
          target:
            entity_id: timer.timer_garage_spotlight
    - conditions:
      - condition: trigger
        id:
        - 0800
      sequence:
      - action: media_player.volume_set
        data:
          volume_level: 0.3
        target:
          entity_id:
          - media_player.babe_cave
          - media_player.counter
          - media_player.dining_room
    - conditions:
      - condition: trigger
        id:
        - Spotlight Timer Complete
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.garage_spot_light
    - conditions:
      - condition: trigger
        id:
        - garage_door_locked
      - condition: state
        entity_id: input_select.josh_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: input_select.mj_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: alarm_control_panel.home_alarm
        state: disarmed
      sequence:
      - if:
        - condition: state
          entity_id: input_select.josh_status
          state: Extended Away
        - condition: state
          entity_id: input_select.mj_status
          state: Extended Away
        then:
        - action: alarm_control_panel.alarm_arm_vacation
          target:
            entity_id: alarm_control_panel.home_alarm
        else:
        - action: alarm_control_panel.alarm_arm_away
          target:
            entity_id: alarm_control_panel.home_alarm
      - action: notify.mobile_app_josh_mobile
        data:
          title: "\U0001F512 House Secured"
          message: The garage man door was locked and the alarm has re-armed based
            on your current status.
      alias: Sitter Departs / Smart Re-Arm
  mode: parallel
  max: 15
- id: '1724440692522'
  alias: Motion Kitchen
  description: Handles kitchen and dining lighting based on motion and occupancy timers.
  triggers:
  - trigger: state
    entity_id: binary_sensor.motion_indoors_kitchen
    to: 'on'
    id: motion
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.timer_kitchen
    id: t02
  conditions:
  - condition: state
    entity_id: alarm_control_panel.home_alarm
    state: disarmed
  - condition: state
    entity_id: input_boolean.motion_lockout
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: motion
      sequence:
      - action: timer.start
        target:
          entity_id: timer.timer_kitchen
      - if:
        - condition: state
          entity_id: light.kitchen_light
          state: 'off'
        then:
        - parallel:
          - action: light.turn_on
            data:
              transition: 0.5
              color_temp_kelvin: 4500
              brightness_pct: 100
            target:
              entity_id:
              - light.island
              - light.big_kitchen_lights
              - light.dining
          - action: light.turn_on
            data:
