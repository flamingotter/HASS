- id: '1724262570606'
  alias: Alarm panel functions and mode actions
  description: ''
  triggers:
  - entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed
    to: disarmed
    trigger: state
  - alias: When Home Alarm changes from Armed Night to Disarmed
    entity_id:
    - alarm_control_panel.home_alarm
    id: disarmed from armed night
    to: disarmed
    from: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed night
    to: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed
    to: armed_home
    trigger: state
  - entity_id:
    - alarm_control_panel.home_alarm
    id: armed away
    to: armed_away
    trigger: state
  - entity_id:
    - input_select.josh_status
    - input_select.mj_status
    id: person status
    alias: person status
    trigger: state
  - at: 08:00:00
    id: 0800
    alias: 0800
    trigger: time
  - trigger: state
    entity_id:
    - timer.timer_garage_spotlight
    to:
    - idle
    from:
    - active
    id: Spotlight Timer Complete
    alias: Spotlight Timer Complete
  - trigger: event
    event_type: zwave_js_notification
    event_data:
      device_id: 621aa1c4c9243ca0eb0bb5c81174a2c6
      command_class: 113
      type: 6
      event: 5
    id: garage_door_locked
    alias: When Garage Door is Locked
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - person status
      sequence:
      - choose:
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: Josh is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.josh_status
              state: Home
          - condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Work
            alias: MJ is in an Away State
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: Josh has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: Josh Disarmed
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: disarmed
            - condition: state
              entity_id: alarm_control_panel.home_alarm
              state: armed_night
            alias: Is Not Disarmed or Armed Night
          - alias: MJ is Home OR Just Arrived
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.mj_status
              state: Just Arrived
            - condition: state
              entity_id: input_select.mj_status
              state: Home
          - alias: Josh is in an Away State
            condition: or
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.josh_status
              state: Work
          sequence:
          - action: notify.mobile_app_josh_mobile
            data:
              message: MJ has Arrived Home
              title: Disarmed
          - action: alarm_control_panel.alarm_disarm
            data:
              code: '1977'
            target:
              entity_id: alarm_control_panel.home_alarm
          alias: MJ Disarmed
        - conditions:
          - condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Away
            - condition: state
              entity_id: input_select.mj_status
              state: Away
            alias: Away / Away
          sequence:
          - if:
            - condition: state
              entity_id: input_boolean.house_guests
              state: 'on'
            then:
            - action: notify.mobile_app_josh_mobile
              data:
                message: Set home to Armed Away with House Guests?
                title: Arm Away Verify
                data:
                  tag: arm-guests
                  actions:
                  - action: guests_arm
                    title: Arm
                  - action: guests_ignore
                    title: Ignore
            else:
            - action: alarm_control_panel.alarm_arm_away
              target:
                entity_id: alarm_control_panel.home_alarm
          alias: Away / Away
        - conditions:
          - alias: Ext Away / Ext Away
            condition: and
            conditions:
            - condition: state
              entity_id: input_select.josh_status
              state: Extended Away
            - condition: state
              entity_id: input_select.mj_status
              state: Extended Away
          sequence:
          - action: alarm_control_panel.alarm_arm_vacation
            target:
              entity_id: alarm_control_panel.home_alarm
          - action: notify.mobile_app_josh_mobile
            data:
              title: Armed Vacation / Eco Mode
              message: Home is set to Armed Vacation. Eco Mode Activated. Set number
                of days until return to normal.
              data:
                tag: eco-activate
                actions:
                - action: REPLY
                  title: Set Days to Normal
                - action: eco-ignore
                  title: Ignore
          alias: Armed Vacation
      alias: When triggered by person status, set alarm panel mode.
    - conditions:
      - condition: trigger
        id:
        - armed away
      sequence:
      - parallel:
        - action: lock.lock
          target:
            entity_id: lock.door_locks
        - action: light.turn_off
          target:
            entity_id:
            - light.lights
            - light.bedroom
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.reading_mode
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.camera_alerts
        - action: notify.mobile_app_josh_mobile
          data:
            title: Armed Away
            message: Both Josh and MJ are Away!
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - disarmed
        - condition: template
          value_template: '{{ trigger.from_state.state != "armed_night" }}'
      alias: When triggered by disarmed
      sequence:
      - action: script.turn_on
        target:
          entity_id:
          - script.welcome_home_ai_debrief
        data: {}
      - parallel:
        - action: switch.turn_on
          target:
            entity_id: switch.garage_spot_light
        - action: timer.start
          data:
            duration: 00:05:00
          target:
            entity_id: timer.timer_garage_spotlight
    - conditions:
      - condition: trigger
        id:
        - 0800
      sequence:
      - action: media_player.volume_set
        data:
          volume_level: 0.3
        target:
          entity_id:
          - media_player.babe_cave
          - media_player.counter
          - media_player.dining_room
    - conditions:
      - condition: trigger
        id:
        - Spotlight Timer Complete
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.garage_spot_light
    - conditions:
      - condition: trigger
        id:
        - garage_door_locked
      - condition: state
        entity_id: input_select.josh_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: input_select.mj_status
        state:
        - Away
        - Extended Away
      - condition: state
        entity_id: alarm_control_panel.home_alarm
        state: disarmed
      sequence:
      - if:
        - condition: state
          entity_id: input_select.josh_status
          state: Extended Away
        - condition: state
          entity_id: input_select.mj_status
          state: Extended Away
        then:
        - action: alarm_control_panel.alarm_arm_vacation
          target:
            entity_id: alarm_control_panel.home_alarm
        else:
        - action: alarm_control_panel.alarm_arm_away
          target:
            entity_id: alarm_control_panel.home_alarm
      - action: notify.mobile_app_josh_mobile
        data:
          title: "\U0001F512 House Secured"
          message: The garage man door was locked and the alarm has re-armed based
            on your current status.
      alias: Sitter Departs / Smart Re-Arm
  mode: parallel
  max: 15
- id: '1724440692522'
  alias: Motion Kitchen
  description: ''
  triggers:
  - alias: motion
    entity_id:
    - binary_sensor.motion_indoors_kitchen
    to: 'on'
    id: motion
    trigger: state
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_kitchen
    id: t02
    trigger: event
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    - condition: state
      entity_id: input_boolean.motion_lockout
      state: 'off'
  actions:
  - alias: Turn on and start timer
    if:
    - condition: trigger
      id:
      - motion
    then:
    - if:
      - condition: state
        state: 'on'
        entity_id: light.kitchen_light
      then:
      - metadata: {}
        data: {}
        action: timer.start
        target:
          entity_id: timer.timer_kitchen
      else:
      - if:
        - condition: and
          conditions:
          - condition: state
            entity_id: media_player.samsung_65
            state: 'on'
        then: []
        else:
        - parallel:
          - metadata: {}
            data: {}
            action: timer.start
            target:
              entity_id: timer.timer_kitchen
          - action: light.turn_on
            metadata: {}
            data:
              transition: 0.5
              color_temp_kelvin: 4500
              brightness_pct: 100
            target:
              entity_id:
              - light.island
              - light.big_kitchen_lights
              - light.dining
          - action: light.turn_on
            metadata: {}
            data:
              rgb_color:
              - 137
              - 41
              - 255
              brightness_pct: 100
              transition: 2
            target:
