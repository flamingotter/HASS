- id: '1722628663642'
  alias: Motion Parlor
  description: ''
  triggers:
  - entity_id:
    - binary_sensor.motion_parlor
    to: 'on'
    id: motion
    trigger: state
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_parlor
    id: t02
    trigger: event
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    - condition: state
      entity_id: input_boolean.motion_lockout
      state: 'off'
    - condition: state
      entity_id: input_boolean.reading_mode
      state: 'off'
  actions:
  - alias: Turn on and start timer
    if:
    - condition: trigger
      id:
      - motion
    then:
    - if:
      - condition: state
        state: 'on'
        entity_id: light.parlor_light
      then:
      - action: timer.start
        target:
          entity_id: timer.timer_parlor
      else:
      - if:
        - condition: device
          type: is_on
          device_id: 784f7bc2a44b163370bd3af1580c7626
          entity_id: d4aa1165af3cb0daf0fc7e48a251088a
          domain: remote
        then:
        - parallel:
          - action: timer.start
            target:
              entity_id: timer.timer_parlor
          - action: light.turn_on
            data:
              rgb_color:
              - 106
              - 0
              - 255
              brightness_pct: 100
              transition: 2
            target:
              entity_id: light.masonic_lamp
          - action: light.turn_on
            data:
              rgb_color:
              - 137
              - 41
              - 255
              brightness_pct: 100
              transition: 2
            target:
              entity_id: light.spot_light
        else:
        - parallel:
          - action: timer.start
            target:
              entity_id: timer.timer_parlor
          - action: light.turn_on
            data:
              transition: 1
            target:
              entity_id: light.parlor_light
          - action: light.turn_on
            data:
              rgb_color:
              - 137
              - 41
              - 255
              brightness_pct: 100
              transition: 2
            target:
              entity_id: light.spot_light
          - action: light.turn_on
            data:
              rgb_color:
              - 106
              - 0
              - 255
              brightness_pct: 100
              transition: 2
            target:
              entity_id: light.masonic_lamp
  - if:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - t02
      - condition: state
        entity_id: input_boolean.cleaning
        state: 'off'
      - condition: not
        conditions:
        - condition: state
          entity_id: sensor.last_motion_indoors
          state: Parlor
    then:
    - action: light.turn_off
      data:
        transition: 2
      target:
        entity_id:
        - light.spot_light
        - light.masonic_lamp
        - light.parlor_light
  mode: restart
- id: '1723572617932'
  alias: 3D Printer ON/OFF
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'on'
    id: t01
    for:
      hours: 0
      minutes: 0
      seconds: 1
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: power off
  - platform: state
    entity_id:
    - input_boolean.3dprinter_safety
    to: 'off'
    id: t03
    enabled: true
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - target:
          entity_id: switch.office_strip_socket_06
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id:
        - power off
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.3dprinter_safety
          state: 'off'
          for:
            hours: 0
            minutes: 0
            seconds: 0
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.office_strip_socket_06
        else:
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_power
    - conditions:
      - condition: trigger
        id:
        - t03
      sequence:
      - sequence:
        - delay:
            hours: 0
            minutes: 0
            seconds: 10
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_safety
  mode: parallel
  max: 10
- id: '1723652703682'
  alias: 3D Print Progress Notify
  description: ''
  trigger:
  - type: value
