- id: '1717276452552'
  alias: MBR Bedtime
  description: Two-stage bedtime process controlled by Alarm State.
  triggers:
  - tag_id: bedtime_01
    trigger: tag
  - entity_id:
    - input_boolean.bedtime
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    then:
    - sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.home_alarm
        data: {}
      - action: lock.lock
        enabled: true
        target:
          entity_id: lock.garage_door
      - if:
        - condition: state
          entity_id: input_boolean.trash_reminder
          state:
          - 'on'
        then:
        - data:
            message: It looks like you may have forgotten to take the trash to the
              street.
            target: media_player.bedroom
            data:
              type: tts
          action: notify.alexa_media
        alias: Check Trash Reminder
      - if:
        - condition: state
          entity_id: input_boolean.holiday_mode
          state:
          - 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.led_tree
        alias: Holiday mode actions
      - if:
        - condition: state
          entity_id: climate.t6_pro_downstairs
          state:
          - heat
        then:
        - action: switch.turn_on
          metadata: {}
          target:
            entity_id: switch.bedroom_humidifier
          data: {}
        alias: Thermostat set to Heat actions
      - action: homeassistant.turn_off
        metadata: {}
        target:
          label_id: bedtime_off
        data: {}
      - action: homeassistant.turn_on
        metadata: {}
        target:
          label_id: bedtime_on
        data: {}
    else:
    - action: script.bedtime_charging_check
    - target:
        device_id: 8781654d992a7a4701cbec887fab30d9
      action: media_player.turn_off
    - target:
        entity_id:
        - light.eugene
        - light.rapunzel
      action: light.turn_off
      data: {}
    - data:
        media:
          media_content_id: bedtime
          media_content_type: routine
      action: media_player.play_media
      target:
        device_id:
        - 66288267303a20ddbebaff9c0666d31d
    - target:
        entity_id: switch.noise_machines
      action: switch.turn_on
    - target:
        entity_id: input_boolean.bedtime
      action: input_boolean.turn_off
  mode: single
- id: '1720447716098'
  alias: Set Theme
  description: Set theme base on sun.sun state
  trigger:
