- id: '1766015428765'
  alias: Dining Room Lights
  description: Controls smart bulbs via ZEN23 Scene Events
  triggers:
  - event_type: zwave_js_value_notification
    event_data:
      device_id: 4f85b8e83fb2e6f3b130438e382af85b
      command_class: 91
    id: zen23_event
    trigger: event
  - event_type: zwave_js_value_notification
    event_data:
      device_id: 81d2709e0359c0ec68a29a70154c04dc
      command_class: 91
    id: zen23_event
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.property_key == ''002'' and trigger.event.data.value
          == ''KeyPressed'' }}'
      sequence:
      - data:
          brightness_pct: 100
          transition: 0.5
        action: light.turn_on
        target:
          entity_id: light.dining
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.property_key == ''001'' and trigger.event.data.value
          == ''KeyPressed'' }}'
      sequence:
      - target:
          entity_id: light.dining
        action: light.turn_off
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.property_key == ''001'' and trigger.event.data.value
          == ''KeyPressed2x'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.dining
        data:
          transition: 0.5
          brightness_pct: 20
  mode: restart
- id: '1772286703556'
  alias: Door Security & Safety
  description: Instant entry announcements + 3-minute cat-safety alerts
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.garage_man_door_window_door_is_open
    to: 'on'
    id: instant_announce
  - trigger: state
    entity_id:
    - binary_sensor.garage_man_door_window_door_is_open
    to: 'on'
    for: 00:03:00
    id: long_open_alert
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: instant_announce
      sequence:
      - action: notify.alexa_media
        data:
          message: '{{ state_attr(trigger.entity_id, ''friendly_name'') }} opened'
          target: media_player.counter
      - wait_for_trigger:
        - trigger: template
          value_template: '{{ false }}'
        timeout: 00:10:00
    - conditions:
      - condition: trigger
        id: long_open_alert
      sequence:
      - action: notify.all_devices
        data:
          title: Door Open
          message: The {{ state_attr(trigger.entity_id, 'friendly_name') }} is Open!
      - action: notify.alexa_media
        data:
          message: Attention! The {{ state_attr(trigger.entity_id, 'friendly_name')
            }} has been open for three minutes!
          data:
            type: announce
          target:
          - media_player.counter
          - media_player.living_room
          - media_player.bedroom
          - media_player.garage
          - media_player.dining_room
  mode: parallel
  max: 10
- id: '1772634026962'
  alias: Motion Front Porch Presence Lighting
  description: Lights on when person detected at porch, off 2 mins after G5 motion
    clears
  triggers:
  - entity_id: binary_sensor.front_porch_ptz_person_detected
    to: 'on'
    trigger: state
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  actions:
  - target:
      entity_id: switch.front_yard_lights
    action: switch.turn_on
  - wait_for_trigger:
    - entity_id:
      - binary_sensor.front_porch_ptz_object_detected
      for:
        minutes: 2
      trigger: state
      to:
      - 'off'
  - target:
      entity_id: switch.front_yard_lights
    action: switch.turn_off
  mode: restart
