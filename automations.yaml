      device_id: ed054a2617f24033ca54f8a5ed0f186c
      property_key: '005'
      value: KeyPressed
    id: '005'
  - alias: 'State Change: Big Kitchen'
    trigger: state
    entity_id: light.big_kitchen_lights
    id: Update LEDs
  - alias: 'State Change: Island'
    trigger: state
    entity_id: light.island
    id: Update LEDs
  - alias: 'Brightness Change: Big Kitchen'
    trigger: state
    entity_id: light.big_kitchen_lights
    attribute: brightness
    id: Update LEDs
  - alias: 'Brightness Change: Island'
    trigger: state
    entity_id: light.island
    attribute: brightness
    id: Update LEDs
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: '005'
      sequence:
      - action: light.toggle
        target:
          entity_id: light.big_kitchen_lights
        data:
          transition: 0.5
    - conditions:
      - condition: trigger
        id: '001'
      sequence:
      - if:
        - condition: state
          entity_id: light.island
          state: 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.island
        else:
        - action: light.turn_on
          target:
            entity_id: light.island
          data:
            brightness_pct: 100
            transition: 0.5
    - conditions:
      - condition: trigger
        id: '002'
      sequence:
      - action: scene.turn_on
        metadata: {}
        target:
          entity_id: scene.kitchen_dim
        data: {}
    - conditions:
      - condition: trigger
        id: '003'
      sequence:
      - if:
        - condition: state
          entity_id: switch.adaptive_lighting_kitchen
          state: 'on'
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.adaptive_lighting_kitchen
        - action: light.turn_on
          target:
            entity_id:
            - light.big_kitchen_lights
            - light.island
          data:
            transition: 0
            color_temp_kelvin: 4500
            brightness_pct: 100
        else:
        - action: switch.turn_on
          target:
            entity_id: switch.adaptive_lighting_kitchen
    - conditions:
      - condition: trigger
        id: Update LEDs
      sequence:
      - action: script.update_kitchen_zen35_leds
  mode: restart
