- id: '1773858634897'
  alias: 'Security: Devine''s Code Used'
  description: Disarms the house when the Devine's use their specific lock code.
  triggers:
  - trigger: event
    event_type: zwave_js_notification
    event_data:
      device_id: 621aa1c4c9243ca0eb0bb5c81174a2c6
