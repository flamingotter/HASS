- id: ai_climate_mbr_v7_0
  alias: 'AI Enabled Climate: Master Bedroom Sleep Comfort Engine (v7.7)'
  description: 'v7.7: Total Transparency. Full mobile visibility for all phases and AI reasoning recorded in logs.'
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.mbr_pre_cooling_active
    - sensor.bedroom_temperature_smoothed
    - climate.t6_pro_downstairs
    - input_boolean.eco_mode
  - trigger: time
    at: 07:00:00
    id: wake_up
  - trigger: time
    at: '19:00:00'
    id: strategist
  - trigger: time
    at: input_datetime.bedroom_bedtime
    id: bedtime
  - trigger: homeassistant
    event: start
    id: boot
  conditions:
  - condition: state
    entity_id: climate.t6_pro_downstairs
    state: cool
  actions:
  - variables:
      target: '{{ states(''input_number.bedroom_target_temperature'') | float(68)
        }}'
      actual: '{% set bdr = states(''sensor.bedroom_temperature_smoothed'') %} {%
        set t6 = state_attr(''climate.t6_pro_downstairs'', ''current_temperature'')
        %} {{ bdr | float(t6 | float(72)) }}

        '
      is_sleep_window: '{% set b = states(''input_datetime.bedroom_bedtime'') %} {%
        set bedtime_str = b if b not in [''unknown'', ''unavailable'', ''None''] else
        ''22:30:00'' %} {{ now() >= today_at(bedtime_str) or now().hour < 7 }}

        '
      t6_target: '{{ state_attr(''climate.t6_pro_downstairs'', ''temperature'') |
        float(68) }}'
      is_precooling: '{{ is_state(''binary_sensor.mbr_pre_cooling_active'', ''on'')
        }}'
      log_entity: notify.climate_control_log
  - choose:
    - alias: 'Override: Eco Mode Active'
      conditions:
      - condition: state
        entity_id: input_boolean.eco_mode
        state: 'on'
      sequence:
      - stop: Eco Mode Active
    - alias: 'AI Strategy: Evening Free Cooling Audit'
      conditions:
      - condition: trigger
        id: strategist
      sequence:
      - action: ai_task.generate_data
        continue_on_error: true
        data:
          task_name: Free Cooling Strategist
          instructions: 'Analyze the outdoor temperature ({{ states(''sensor.weather_station_temperature_outdoor'')
            }}F)  and the bedroom temperature ({{ actual }}F).  If the outdoor temperature
            is at least 3 degrees cooler than the bedroom, suggest opening the screened
            patio door. Mention estimated savings of ~20% AC runtime. Keep response
            under 20 words.

            '
        response_variable: strategist_advice
      - action: notify.mobile_app_josh_mobile
        data:
          title: Climate Strategy
          message: '{{ (strategist_advice | default({})).data | default(''The outdoor
            air is currently cooler than the bedroom. Consider opening the patio door
            to save energy.'') }}'
    - alias: 'Phase 1: Wake Up (Reset to Neutral)'
      conditions:
      - condition: trigger
        id: wake_up
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: 68
      - action: notify.send_message
        target:
          entity_id: '{{ log_entity }}'
        data:
          message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_1_WAKEUP,Indoor:
            {{ actual }},Resetting to 68F'
    - alias: 'Phase 2: Pre-Cooling (AI Adjusted Start)'
      conditions:
      - condition: template
        value_template: '{{ is_precooling and not is_sleep_window and t6_target !=
          60 and actual > (target + 0.5) }}'
      sequence:
      - action: ai_task.generate_data
        continue_on_error: true
        data:
          task_name: Comfort Optimizer
          instructions: 'The current target is {{ target }}F. The indoor humidity
            is {{ states(''sensor.humidity_mbr'') }}%. If humidity is > 55%, recommend
            dropping target by 1 degree for ''Comfort-Adjusted'' cooling. Return your response
            in the format: [VALUE] Reasoning: [One sentence explanation].'
        response_variable: comfort_target
      - variables:
          ai_raw: "{{ (comfort_target | default({})).data | default(target|string) }}"
          ai_target: "{{ ai_raw.split(']')[0] | replace('[', '') | float(target) }}"
          ai_reason: "{{ ai_raw.split('Reasoning:')[1] | default('Standard target used.') }}"
      - delay: 00:02:00
      - variables:
          actual_now: '{% set bdr = states(''sensor.bedroom_temperature_smoothed'')
            %} {% set t6 = state_attr(''climate.t6_pro_downstairs'', ''current_temperature'')
            %} {{ bdr | float(t6 | float(72)) }}

            '
      - if:
        - condition: template
          value_template: '{{ actual_now <= ai_target }}'
        then:
        - stop: Sensor jitter or AI target met during validation delay.
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.precool_start_time
        data:
          datetime: '{{ now() }}'
      - action: input_number.set_value
        target:
          entity_id: input_number.precool_start_temp
        data:
          value: '{{ actual }}'
      - action: notify.mobile_app_josh_mobile
        data:
          title: 'Climate: Pre-Cool Started'
          message: 'Target: {{ ai_target }}F (AI Adj). {{ ai_reason }} Room: {{ actual }}F | Outdoor: {{ states(''sensor.weather_station_temperature_outdoor'') }}F | Est: {{ ( (actual - ai_target) * state_attr(''binary_sensor.mbr_pre_cooling_active'', ''observed_rate_used'') | float ) | round(0) }} mins.'
      - action: notify.send_message
        target:
          entity_id: '{{ log_entity }}'
        data:
          message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_2_START,Indoor:
            {{ actual }},Target: {{ ai_target }},Outdoor: {{ states(''sensor.weather_station_temperature_outdoor'')
            }},AI_Reason: {{ ai_reason | trim }}'
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: 60
    - alias: 'Phase 3: Pre-Cooling Complete (Handoff & AI Auditor)'
      conditions:
      - condition: template
        alias: 'Latch: Only run if currently in Agonal Push'
        value_template: '{{ t6_target == 60 }}'
      - or:
        - condition: template
          value_template: '{{ actual <= target }}'
        - condition: trigger
          id: bedtime
      sequence:
      - variables:
          start_ts: "{{ state_attr('input_datetime.precool_start_time', 'timestamp') | float(as_timestamp(now())) }}"
          duration: "{{ (as_timestamp(now()) - start_ts) / 60 }}"
          start_temp: "{{ states('input_number.precool_start_temp') | float(actual) }}"
          current_temp: "{{ states('sensor.bedroom_temperature_smoothed') | float(actual) }}"
          drop: "{{ start_temp - current_temp }}"
          obs_rate: "{{ (duration / drop) | round(1) if drop > 0.1 else 999.0 }}"
      - if:
        - condition: template
          alias: Minimum Run Time Check (5 minutes)
          value_template: '{{ duration < 5 and trigger.id != ''bedtime'' }}'
        then:
        - action: notify.send_message
          target:
            entity_id: "{{ log_entity }}"
          data:
            message: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }},PHASE_3_HANDOFF,Indoor: {{ actual }},Target: {{ target }},NOTE: Min run time not met - skipping audit."
        - action: climate.set_temperature
          target:
            entity_id: climate.t6_pro_downstairs
          data:
            temperature: "{{ target }}"
        - stop: Minimum run time not met. Handoff performed without learning.
      - if:
        - condition: template
          alias: AI Integrity Audit & Learning Gate
          value_template: >
            {{ t6_target == 60 and ((actual <= target) or (trigger.id == 'bedtime' and is_precooling)) }}
        then:
        - action: ai_task.generate_data
          continue_on_error: true
          data:
            task_name: Learning Auditor
            instructions: 'A cooling session dropped {{ drop }}F in {{ duration }}
              minutes. Calculated rate: {{ obs_rate }} min/deg. Is this rate physically
              plausible for a residential AC (usually 10-45 min/deg)?  If the rate
              is < 5 min/deg, it is likely an anomaly. Return your verdict starting
              with ''VALID'' or ''ANOMALY'' followed by a one-sentence explanation.'
          response_variable: audit_result
        - variables:
            audit_verdict: '{{ (audit_result | default({''data'': ''VALID: No AI response''}
              )).data }}'
            outdoor: '{{ states(''sensor.weather_station_temperature_outdoor'') |
              float(70) }}'
            lookup_key: '{{ ((outdoor / 5) | round(0) * 5) | string }}'
            repo: '{{ states(''input_text.mbr_cooling_performance_data'') | from_json
              }}'
        - if:
          - condition: template
            value_template: '{{ ''VALID'' in audit_verdict | upper }}'
          then:
          - variables:
              old_rate: '{{ repo.get(lookup_key, obs_rate) | float }}'
              raw_weighted: '{{ ((old_rate * 0.7) + (obs_rate * 0.3)) | round(1) }}'
              clamped_rate: '{{ [ [raw_weighted, 10.0]|max, 45.0 ]|min }}'
              new_rate: '{% set diff = clamped_rate - old_rate %} {% set cap = 5.0
                %} {% if diff > cap %}{{ (old_rate + cap) | round(1) }}{% elif diff
                < (cap * -1) %}{{ (old_rate - cap) | round(1) }}{% else %}{{ clamped_rate
                }}{% endif %}

                '
              new_repo: >
                {% set new_entry = {lookup_key|string: new_rate|float} %}
                {% set merged = dict(repo.items() | list + new_entry.items() | list) %}
                {{ merged | to_json }}
          - action: input_text.set_value
            target:
              entity_id: input_text.mbr_cooling_performance_data
            data:
              value: '{{ new_repo }}'
          - action: notify.mobile_app_josh_mobile
            data:
              title: 'Climate: AI Session Learned'
              message: 'Analysis: {{ audit_verdict }} Bin {{ lookup_key }}F -> {{
                new_rate }} min/deg. Obs: {{ obs_rate }} | Old: {{ old_rate }} | Wt:
                {{ raw_weighted }}

                '
          - action: notify.send_message
            target:
              entity_id: '{{ log_entity }}'
            data:
              message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_3_LEARNED,ObsRate:
                {{ obs_rate }},NewRate: {{ new_rate }},Bin: {{ lookup_key }},Audit:
                {{ audit_verdict | trim }}'
          else:
          - action: notify.mobile_app_josh_mobile
            data:
              title: '⚠️ Climate: Data Anomaly Detected'
              message: 'AI Analysis: {{ audit_verdict }} Observed: {{ obs_rate }}
                min/deg. Repository update skipped.

                '
          - action: notify.send_message
            target:
              entity_id: '{{ log_entity }}'
            data:
              message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_3_ANOMALY,ObsRate:
                {{ obs_rate }},Audit: {{ audit_verdict | trim }}'
      - action: notify.send_message
        target:
          entity_id: '{{ log_entity }}'
        data:
          message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_3_HANDOFF,Indoor:
            {{ actual }},Handing off to target {{ target }}'
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: '{{ target }}'
      - action: notify.mobile_app_josh_mobile
        data:
          title: 'Climate: MBR Target Reached'
          message: 'Target {{ target }}F achieved. Handoff to maintenance mode complete.
            Session: {{ duration | round(0) }} mins.'
    - alias: 'Phase 4: Sleep Window (Keep Cool)'
      conditions:
      - condition: template
        value_template: '{{ is_sleep_window and actual >= (target + 1.0) and t6_target
          != (target - 2.0) }}'
      sequence:
      - action: notify.mobile_app_josh_mobile
        data:
          title: 'Climate: Maintenance Push'
          message: 'Room rose to {{ actual }}F. Pushing back to {{ target - 2.0 }}F.'
      - action: notify.send_message
        target:
          entity_id: '{{ log_entity }}'
        data:
          message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_4_KEEP_COOL,Indoor:
            {{ actual }},Pushing back to {{ target - 2.0 }}F'
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: '{{ target - 2.0 }}'
    - alias: 'Phase 5: Sleep Window (Prevent Over-Cooling)'
      conditions:
      - condition: template
        value_template: '{{ is_sleep_window and actual <= (target - 1.0) and t6_target
          != (target + 2.0) }}'
      sequence:
      - action: notify.mobile_app_josh_mobile
        data:
          title: 'Climate: Over-Cool Guard'
          message: 'Room dropped to {{ actual }}F. Letting warm to {{ target + 2.0 }}F.'
      - action: notify.send_message
        target:
          entity_id: '{{ log_entity }}'
        data:
          message: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }},PHASE_5_PREVENT_OVERCOOL,Indoor:
            {{ actual }},Letting room warm to {{ target + 2.0 }}F'
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: '{{ target + 2.0 }}'
  mode: queued
- id: '1778077597598'
  alias: Motion Babe Cave
  description: ''
  triggers:
  - alias: motion
    entity_id:
    - binary_sensor.motion_indoors_babe_cave
    to:
    - 'on'
    id: motion
    trigger: state
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_babe_cave
    id: t02
    trigger: event
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    - condition: state
      entity_id: input_boolean.motion_lockout
      state: 'off'
  actions:
  - alias: Turn on and start timer
    if:
    - condition: trigger
      id:
      - motion
    then:
    - if:
      - condition: state
        state:
        - 'on'
        entity_id: light.masonic_lamp
      then:
      - metadata: {}
        data: {}
        action: timer.start
        target:
          entity_id: timer.timer_bab_cave
      else:
      - parallel:
        - metadata: {}
          data: {}
          action: timer.start
          target:
            entity_id: timer.timer_bab_cave
        - action: light.turn_on
          metadata: {}
          data:
            transition: 0.5
            rgb_color:
            - 171
            - 35
            - 255
          target:
            entity_id: light.masonic_lamp
  - if:
    - condition: trigger
      id:
      - t02
    - condition: state
      entity_id: input_boolean.cleaning
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.last_motion_indoors
        state:
        - Babe Cave
    then:
    - action: light.turn_off
      metadata: {}
      data: {}
      target:
        entity_id:
        - light.masonic_lamp
  mode: restart
- id: '1778103562000'
  alias: 'Light Control: Office (v1.0)'
  description: Instant control for Office ZEN24 Toggle Dimmer in Smart Light Mode.
  triggers:
  - event_type: zwave_js_value_notification
    event_data:
      device_id: feb5c436b4b7088a73d571cad4175dbd
      property_key: '001'
    id: top
    trigger: event
  - event_type: zwave_js_value_notification
    event_data:
      device_id: feb5c436b4b7088a73d571cad4175dbd
      property_key: '002'
    id: bottom
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == "KeyPressed" and trigger.id
          == "top" }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.office_lights
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.value == "KeyPressed" and trigger.id
          == "bottom" }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.office_lights
  mode: single
