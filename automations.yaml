    id: close_garage_01
    alias: close_garage_01
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      action: ignore_garage_01
    id: ignore_garage_01
    alias: ignore_garage_01
    trigger: event
  - alias: cleared
    event_type: mobile_app_notification_cleared
    id: cleared
    event_data:
      tag: garage-warning_01
      action_1_key: close_garage_01
    trigger: event
  - alias: shuttle_bay Closed
    entity_id:
    - cover.shuttle_bay
    id: shuttle-bay-closed
    trigger: state
    to: closed
