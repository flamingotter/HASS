- id: '1724794143393'
  alias: 'Climate: Enhanced Eco Mode Manager (v2.0)'
  description: Handles Eco Mode timers, extensions via AI parsing, and proximity-based
    deactivation.
  triggers:
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_eco_mode_normal
    id: timer_done
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      tag: eco-finish
      action: REPLY
    id: extend_eco
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      tag: eco-finish
      action: eco_normal
    id: deactivate_eco
    trigger: event
  - event_type: mobile_app_notification_cleared
    event_data:
      tag: eco-finish
    id: notification_cleared
    trigger: event
  - entity_id:
    - sensor.home_josh_distance
    - sensor.home_mj_distance
    below: 264000
    id: proximity_reset
    trigger: numeric_state
  - entity_id: input_boolean.eco_mode
    to: 'on'
    id: eco_activated
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: eco_activated
      sequence:
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: '{% if is_state(''climate.t6_pro_downstairs'', ''cool'') %}
            74 {% elif is_state(''climate.t6_pro_downstairs'', ''heat'') %} 66 {%
            else %} 70 {% endif %}

            '
      - action: notify.mobile_app_josh_mobile
        data:
          title: Eco Mode Activated
          message: 'Home is in Vacation mode. T6 Pro set to {{ state_attr(''climate.t6_pro_downstairs'',
            ''temperature'') }}°F.  How many days should I set the timer for? (e.g.
            ''3'' or ''until Sunday'')

            '
          data:
            tag: eco-finish
            persistent: true
            actions:
            - action: REPLY
              title: Set Timer
            - action: eco_normal
              title: Return to Normal
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: timer_done
        - condition: trigger
          id: notification_cleared
      - condition: state
        entity_id: input_boolean.eco_mode
        state: 'on'
      sequence:
      - action: notify.mobile_app_josh_mobile
        data:
          title: Eco Mode Status
          message: Eco Mode timer has finished. Would you like to return to normal
            or extend?
          data:
            tag: eco-finish
            persistent: true
            actions:
            - action: eco_normal
              title: Return to Normal
            - action: REPLY
              title: Add Days (e.g. '3' or 'until Sunday')
    - conditions:
      - condition: trigger
        id: extend_eco
      sequence:
      - action: ai_task.generate_data
        data:
          task_name: Eco Mode Timer Parser
          instructions: 'The user wants to extend Eco Mode. Their reply was: "{{ trigger.event.data.reply_text
            }}". Convert this into a number of DAYS from now.  If they just gave a
            number, return that number. If they gave a day of the week, calculate
            days until that day. Return ONLY the integer number of days.

            '
        response_variable: extension_days
      - variables:
          days: '{{ (extension_days.data | int(1)) if (extension_days.data | is_number)
            else 1 }}'
          seconds: '{{ ((extension_days.data | int(1)) if (extension_days.data | is_number)
            else 1) * 86400 }}'
      - action: timer.start
        data:
          duration: '{{ seconds }}'
        target:
          entity_id: timer.timer_eco_mode_normal
      - action: notify.mobile_app_josh_mobile
        data:
          title: Eco Mode Extended
          message: 'AI Parser: ''{{ trigger.event.data.reply_text }}'' interpreted
            as {{ days }} days. Eco Mode will remain active.'
          data:
            tag: eco-finish
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: deactivate_eco
        - and:
          - condition: trigger
            id: proximity_reset
          - condition: numeric_state
            entity_id: sensor.home_josh_distance
            below: 264000
          - condition: numeric_state
            entity_id: sensor.home_mj_distance
            below: 264000
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.eco_mode
      - action: timer.cancel
        target:
          entity_id: timer.timer_eco_mode_normal
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: 68
      - action: notify.mobile_app_josh_mobile
        data:
          title: Welcome Home
          message: Eco Mode deactivated ({{ 'Manual' if trigger.id == 'deactivate_eco'
            else 'Proximity' }}). Thermostat set to 68°F.
          data:
            tag: eco-finish
  mode: restart
- id: '1725030108440'
  alias: Cleaning Lifecycle
  description: Manages lights, timers, and AI notifications for cleaning mode.
  triggers:
  - entity_id: input_boolean.cleaning
    to: 'on'
    id: start
    trigger: state
  - entity_id: input_boolean.cleaning
    to: 'off'
    id: stop
    trigger: state
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_cleaning
    id: remind
    trigger: event
  - event_type: mobile_app_notification_cleared
    event_data:
      tag: cleaning-warning
    id: remind
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      action: cleaning_off
    id: stop
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      action: cleaning_snooze
    id: snooze
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: start
      sequence:
      - parallel:
        - action: scene.create
          data:
            scene_id: cleaning_before
            snapshot_entities: '{{ label_entities(''cleaning_light'') }}'
        - action: homeassistant.turn_on
          target:
            label_id: cleaning_light
          data:
            brightness_pct: 100
            kelvin: 4500
      - action: timer.start
        data:
          duration: 01:00:00
        target:
          entity_id: timer.timer_cleaning
    - conditions:
      - condition: trigger
        id: stop
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.cleaning
      - action: timer.cancel
        target:
          entity_id: timer.timer_cleaning
      - action: scene.turn_on
        target:
          entity_id: scene.cleaning_before
      - action: ai_task.generate_data
        continue_on_error: true
        data:
          instructions: 'The user just finished cleaning. Write a high-energy,  hilarious,
            and extremely enthusiastic congratulatory message.  Use some ''Army-style''
            colorful language. Limit to 25 words.

            '
        response_variable: clean_complete_ai
      - action: notify.alexa_media
        data:
          message: '{{ (clean_complete_ai | default({})).data | default(''Cleaning
            mission complete! Outstanding work!'') }}'
          target: '{{ states.sensor.last_alexa.state }}'
    - conditions:
      - condition: trigger
        id: remind
      sequence:
      - action: ai_task.generate_data
        continue_on_error: true
        data:
          instructions: 'The house is still in ''Cleaning Mode''. Write a short,  slightly
            annoying but helpful reminder asking if they are done.  Limit to 20 words.

            '
        response_variable: cleaning_nag
      - action: notify.all_devices
        data:
          title: Cleaning Mode
          message: '{{ (cleaning_nag | default({})).data | default(''The house is
            still in Cleaning Mode. Are you done?'') }}'
          data:
            tag: cleaning-warning
            actions:
            - action: cleaning_off
              title: Turn Off
            - action: cleaning_snooze
              title: Snooze 30min
    - conditions:
      - condition: trigger
        id: snooze
      sequence:
      - action: timer.start
        data:
          duration: 00:30:00
        target:
          entity_id: timer.timer_cleaning
  mode: restart
