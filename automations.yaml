  alias: 'Notify: Generator Maintenance Test'
  description: Mission-ready generator check with Eco-Aware catch-up logic.
  triggers:
  - event_type: timer.finished
    event_data:
      entity_id: timer.generator_test
    id: remind
    trigger: event
  - entity_id: input_boolean.eco_mode
    to: 'off'
    id: remind
    trigger: state
  - tag_id: 95e7dd1a-71d0-4af9-a813-a9974de3cf87
    id: reset
    trigger: tag
  - event_type: mobile_app_notification_action
    event_data:
      action: gen_done
    id: reset
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      action: gen_snooze
    id: snooze
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: remind
      - condition: state
        entity_id: timer.generator_test
        state: idle
      - condition: state
        entity_id: input_boolean.eco_mode
        state: 'off'
      sequence:
      - action: ai_task.generate_data
        data:
          instructions: 'The monthly generator test is due. Write a short, authoritative
            "Mission Readiness" style reminder for Josh. Focus on ensuring  backup
            power is mission-capable. Limit to 25 words.

            '
        response_variable: gen_nag
      - action: notify.mobile_app_josh_mobile
        data:
          title: 'Readiness Alert: Generator'
          message: '{{ gen_nag[''data''] }}'
          data:
            tag: gen-reminder
            actions:
            - action: gen_done
              title: Test Complete
            - action: gen_snooze
              title: Snooze to 0900
    - conditions:
      - condition: trigger
        id: reset
      sequence:
      - action: script.system_log_maintenance_task
        data:
          task_name: Generator Test
          timer_entity: timer.generator_test
    - conditions:
      - condition: trigger
        id: snooze
      sequence:
      - action: timer.start
        data:
          duration: '{% set target = (now() + timedelta(days=1)).replace(hour=9, minute=0,
            second=0) %} {{ (target - now()).total_seconds() | int }}'
        target:
          entity_id: timer.generator_test
  mode: restart
