- id: system_maintenance_engine
  alias: 'System: Maintenance Engine (v2.0)'
  description: v2.0 Dynamic Engine. Auto-discovers any timer.maintenance_* entity.
    Triggers on expiry, arrival, swipe, or button actions.
  triggers:
  - trigger: event
    event_type: timer.finished
    id: remind
  - trigger: state
    entity_id: input_select.josh_status
    from: Extended Away
    to:
    - Home
    - Just Arrived
    id: remind
  - trigger: event
    event_type: mobile_app_notification_cleared
    id: remind
  - trigger: event
    event_type: mobile_app_notification_action
    id: action_handler
  - trigger: tag
    tag_id:
    - 1e923fae-efb1-40c4-8c45-b5ab3f8beb78
    - 95e7dd1a-71d0-4af9-a813-a9974de3cf87
    id: reset
  actions:
  - variables:
      all_maint_timers: '{{ states.timer | selectattr(''entity_id'', ''search'', ''^timer.maintenance_'')
        | map(attribute=''entity_id'') | list }}

        '
      idle_maint_timers: '{{ states.timer | selectattr(''entity_id'', ''search'',
        ''^timer.maintenance_'') | selectattr(''state'', ''eq'', ''idle'') | map(attribute=''entity_id'')
        | list }}

        '
  - choose:
    - conditions:
      - condition: trigger
        id: remind
      - condition: template
        value_template: '{% set is_maint = trigger.event.data.entity_id in all_maint_timers
          if trigger.platform == ''event'' and trigger.event.event_type == ''timer.finished''
          else true %} {% set is_swipe = trigger.event.data.tag in all_maint_timers
          if trigger.platform == ''event'' and trigger.event.event_type == ''mobile_app_notification_cleared''
          else true %} {% set home = states(''input_select.josh_status'') in [''Home'',
          ''Just Arrived''] %} {{ home and is_maint and is_swipe and idle_maint_timers
          | length > 0 }}

          '
      sequence:
      - repeat:
          for_each: '{{ idle_maint_timers }}'
          sequence:
          - variables:
              t_name: '{{ state_attr(repeat.item, ''friendly_name'') | replace(''Maintenance
                '', '''') | replace('' Timer'', '''') }}'
          - action: ai_task.generate_data
            continue_on_error: true
            data:
              task_name: '{{ t_name }} Nag'
              instructions: 'The maintenance task "{{ t_name }}" is due. Write a short,
                creative reminder for Josh.  Make it sound like a high-end estate
                manager reporting a necessary maintenance item. Limit to 25 words.

                '
            response_variable: nag_content
          - action: notify.mobile_app_josh_mobile
            data:
              title: 'Maintenance Alert: {{ t_name }}'
              message: '{{ (nag_content | default({})).data | default("Maintenance
                is due for " ~ t_name) }}'
              data:
                tag: '{{ repeat.item }}'
                actions:
                - action: '{{ repeat.item }}_done'
                  title: Done
                - action: '{{ repeat.item }}_snooze'
                  title: Snooze 24h
    - conditions:
      - condition: trigger
        id: action_handler
      sequence:
      - variables:
          raw_action: '{{ trigger.event.data.action }}'
          target_timer: '{{ raw_action | replace(''_done'', '''') | replace(''_snooze'',
            '''') }}'
          is_done: '{{ ''_done'' in raw_action }}'
          is_snooze: '{{ ''_snooze'' in raw_action }}'
      - if:
        - condition: template
          value_template: '{{ target_timer in all_maint_timers }}'
        then:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ is_done }}'
            sequence:
            - action: script.system_log_maintenance_task
              data:
                timer_entity: '{{ target_timer }}'
          - conditions:
            - condition: template
              value_template: '{{ is_snooze }}'
            sequence:
            - action: timer.start
              data:
                duration: '24:00:00'
              target:
                entity_id: '{{ target_timer }}'
    - conditions:
      - condition: trigger
        id: reset
      sequence:
      - variables:
          task_entity: '{% set tag = trigger.event.data.tag_id %} {% if tag == ''1e923fae-efb1-40c4-8c45-b5ab3f8beb78''
            %}timer.maintenance_hvac_filter {% elif tag == ''95e7dd1a-71d0-4af9-a813-a9974de3cf87''
            %}timer.maintenance_generator_test {% else %}none{% endif %}

            '
      - if:
        - condition: template
          value_template: '{{ task_entity != ''none'' }}'
        then:
        - action: script.system_log_maintenance_task
          data:
            timer_entity: '{{ task_entity }}'
  mode: parallel
  max: 10
