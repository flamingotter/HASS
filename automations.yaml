- id: '1724794143393'
  alias: 'Presence: Enhanced Eco Mode Manager'
  description: Handles Eco Mode timers, extensions via actionable notifications, and
    climate resets
  triggers:
  - event_type: timer.finished
    event_data:
      entity_id: timer.timer_eco_mode_normal
    id: timer_done
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      tag: eco-finish
      action: REPLY
    id: extend_eco
    trigger: event
  - event_type: mobile_app_notification_action
    event_data:
      tag: eco-finish
      action: eco_normal
    id: deactivate_eco
    trigger: event
  - event_type: mobile_app_notification_cleared
    event_data:
      tag: eco-finish
    id: notification_cleared
    trigger: event
  actions:
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: timer_done
        - condition: trigger
          id: notification_cleared
      - condition: state
        entity_id: input_boolean.eco_mode
        state: 'on'
      sequence:
      - action: notify.mobile_app_josh_mobile
        data:
          title: Eco Mode Status
          message: Eco Mode timer has finished. Would you like to return to normal
            or extend?
          data:
            tag: eco-finish
            persistent: true
            actions:
            - action: eco_normal
              title: Return to Normal
            - action: REPLY
              title: Add Days
    - conditions:
      - condition: trigger
        id: extend_eco
      sequence:
      - variables:
          days: '{{ trigger.event.data.reply_text | int(1) }}'
          seconds: '{{ (trigger.event.data.reply_text | int(1)) * 86400 }}'
      - action: timer.start
        data:
          duration: '{{ seconds }}'
        target:
          entity_id: timer.timer_eco_mode_normal
      - action: notify.mobile_app_josh_mobile
        data:
          title: Eco Mode Extended
          message: Eco Mode will remain active for {{ days }} more days.
          data:
            tag: eco-finish
    - conditions:
      - condition: trigger
        id: deactivate_eco
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.eco_mode
      - action: timer.cancel
        target:
          entity_id: timer.timer_eco_mode_normal
      - action: climate.set_temperature
        target:
          entity_id: climate.t6_pro_downstairs
        data:
          temperature: 68
      - action: notify.mobile_app_josh_mobile
        data:
          title: Welcome Home
          message: Eco Mode deactivated. Thermostat set to 68°F.
          data:
            tag: eco-finish
  mode: restart
