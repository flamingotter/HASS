- id: appliance_alert_engine
  alias: 'System: Appliance Alert Engine'
  description: Unified engine for monitoring appliance power consumption and performance.
  variables:
    appliance_map:
      sensor.beer_fridge_electric_consumption_w:
        name: Beer Fridge
        switch: switch.beer_fridge
        tag: beer01-notify
        off_action: beer01-off
      sensor.freezer_electric_consumption_w:
        name: Freezer
        switch: switch.freezer
        tag: frzr01-notify
        off_action: frzr01-off
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.beer_fridge_electric_consumption_w
    - sensor.freezer_electric_consumption_w
    for:
      hours: 3
    below: 10
    id: stalled
  - trigger: numeric_state
    entity_id:
    - sensor.beer_fridge_electric_consumption_w
    - sensor.freezer_electric_consumption_w
    for:
      hours: 5
    above: 10
    id: overrunning
  - trigger: event
    event_type: mobile_app_notification_action
    id: remote_off
  actions:
  - variables:
      appliance_sensor: "{% if trigger.id == 'remote_off' %}\n  {% if trigger.event.data.action
        == 'beer01-off' %} sensor.beer_fridge_electric_consumption_w\n  {% elif trigger.event.data.action
        == 'frzr01-off' %} sensor.freezer_electric_consumption_w\n  {% endif %}\n{%
        else %}\n  {{ trigger.entity_id | default('') }}\n{% endif %}\n"
      config: '{{ appliance_map.get(appliance_sensor.strip(), {}) }}'
  - condition: template
    value_template: '{{ config.name is defined }}'
  - choose:
    - conditions:
      - condition: trigger
        id: stalled
      sequence:
      - action: script.activate_mobile_actionable_notification
        data:
          notify_target: notify.mobile_app_josh_mobile
          title: '{{ config.name | upper }} ALERT'
          message: '{{ config.name }} hasn''t run in 3 hours!'
          notify_tag: '{{ config.tag }}'
    - conditions:
      - condition: trigger
        id: overrunning
      sequence:
      - action: script.activate_mobile_actionable_notification
        data:
          notify_target: notify.mobile_app_josh_mobile
          title: '{{ config.name | upper }} ALERT'
          message: '{{ config.name }} has been running for > 5hrs!'
          notify_tag: '{{ config.tag }}'
          notify_action_1: '{{ config.off_action }}'
          notify_action_1_title: Turn Off
    - conditions:
      - condition: trigger
        id: remote_off
      - condition: template
        value_template: '{{ config.off_action is defined }}'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: '{{ config.switch }}'
  mode: parallel
  max: 10
