- id: '1717273577381'
  alias: Reading Mode
  description: ''
  trigger:
  - platform: tag
    tag_id: reading_mode
  condition: []
  action:
  - service: input_boolean.toggle
    target:
      entity_id: input_boolean.reading_mode
  mode: single
- id: '1717271382609'
  alias: Outdoor Timelapse
  description: ''
  triggers:
  - hours: /1
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  actions:
  - repeat:
      for_each:
      - camera.driveway_outside_high_resolution_channel
      - camera.patio_left_high_resolution_channel
      - camera.doorbell_outside_high_resolution_channel
      - camera.front_porch_ptz_high_resolution_channel
      sequence:
      - action: camera.snapshot
        data:
          entity_id: '{{ repeat.item }}'
          filename: www/tmp/timelapse/{{ repeat.item.split('.')[1] }}/{{ repeat.item.split('.')[1]
            }}_{{ now().strftime('%Y%m%d_%H%M') }}.jpg
  mode: single
- id: '1717271470147'
  alias: 'Entry: Shuttle Bay Door'
  description: Open/Close the garage door
  triggers:
  - tag_id: garage
    trigger: tag
  conditions: []
  actions:
  - action: cover.toggle
    target:
      entity_id:
      - cover.shuttle_bay
  mode: single
- id: '1717274816399'
  alias: On Air
  description: ''
  triggers:
  - entity_id:
    - input_boolean.onair
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: input_boolean.onair
      state: 'on'
    then:
    - action: scene.create
      data:
        scene_id: before_onair
        snapshot_entities:
        - light.office_light
        - light.spot_light
    - delay:
        seconds: 1
    - parallel:
      - data:
          name: red
        action: frontend.set_theme
      - action: light.turn_on
        data:
          rgb_color:
          - 255
          - 0
          - 0
          brightness_pct: 100
        target:
          entity_id:
          - light.spot_light
    else:
    - parallel:
      - data:
          name: clear
        action: frontend.set_theme
      - action: scene.turn_on
        data: {}
        target:
          entity_id: scene.before_onair
  mode: single
- id: '1717275482675'
  alias: 'Office Scene '
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_select.office_scene_select
  condition: []
  action:
  - service: scene.turn_on
    data_template:
      entity_id: scene.{{trigger.to_state.state}}
      transition: 2
  mode: single
- id: '1717276452552'
  alias: MBR Bedtime
  description: Two-stage bedtime process controlled by Alarm State.
  triggers:
  - tag_id: bedtime_01
    trigger: tag
  - entity_id:
    - input_boolean.bedtime
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: state
      entity_id: alarm_control_panel.home_alarm
      state: disarmed
    then:
    - sequence:
      - action: alarm_control_panel.alarm_arm_night
        target:
          entity_id: alarm_control_panel.home_alarm
        data: {}
      - action: lock.lock
        enabled: true
        target:
          entity_id: lock.garage_man_lock
      - if:
        - condition: state
          entity_id: input_boolean.trash_reminder
          state:
          - 'on'
        then:
        - data:
            message: It looks like you may have forgotten to take the trash to the
              street.
            target: media_player.bedroom
            data:
              type: tts
          action: notify.alexa_media
        alias: Check Trash Reminder
      - if:
        - condition: state
          entity_id: input_boolean.holiday_mode
          state:
          - 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.led_tree
        alias: Holiday mode actions
      - if:
        - condition: state
          entity_id: climate.t6_pro_downstairs
          state:
          - heat
        then:
        - action: switch.turn_on
          metadata: {}
          target:
            entity_id: switch.bedroom_humidifier
          data: {}
        alias: Thermostat set to Heat actions
      - action: homeassistant.turn_off
        metadata: {}
        target:
          label_id: bedtime_off
        data: {}
      - action: homeassistant.turn_on
        metadata: {}
        target:
          label_id: bedtime_on
        data: {}
    else:
    - action: script.bedtime_charging_check
    - target:
        device_id: 8781654d992a7a4701cbec887fab30d9
      action: media_player.turn_off
    - target:
        entity_id:
        - light.eugene
        - light.rapunzel
      action: light.turn_off
      data: {}
    - data:
        media:
          media_content_id: bedtime
          media_content_type: routine
      action: media_player.play_media
      target:
        device_id:
        - 66288267303a20ddbebaff9c0666d31d
    - target:
        entity_id: switch.noise_machines
      action: switch.turn_on
    - target:
        entity_id: input_boolean.bedtime
      action: input_boolean.turn_off
  mode: single
- id: '1720447716098'
  alias: Set Theme
  description: Set theme base on sun.sun state
  trigger:
  - platform: homeassistant
    event: start
  - platform: state
    entity_id:
    - sun.sun
    to: above_horizon
  - platform: state
    entity_id:
    - sun.sun
    to: below_horizon
  condition: []
  action:
  - if:
    - condition: state
      entity_id: sun.sun
      state: above_horizon
    then:
    - data:
        name: clear
      action: frontend.set_theme
    else:
    - data:
        name: clear-dark
      action: frontend.set_theme
  mode: single
- id: '1720737172368'
  alias: MBR Wakeup
  description: ''
  triggers:
  - entity_id:
    - input_boolean.wake_up
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - sequence:
    - action: alarm_control_panel.alarm_disarm
      data:
        code: '1977'
      target:
        entity_id: alarm_control_panel.home_alarm
    - target:
        entity_id: input_boolean.wake_up
      action: input_boolean.turn_off
    - action: switch.turn_off
      target:
        entity_id:
        - switch.bedroom_sleep_mode
        - switch.bedroom_humidifier
  mode: parallel
  max: 10
- id: '1723572617932'
  alias: 3D Printer ON/OFF
  description: ''
  trigger:
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'on'
    id: t01
    for:
      hours: 0
      minutes: 0
      seconds: 1
  - platform: state
    entity_id:
    - input_boolean.3dprinter_power
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: power off
  - platform: state
    entity_id:
    - input_boolean.3dprinter_safety
    to: 'off'
    id: t03
    enabled: true
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - target:
          entity_id: switch.office_strip_socket_06
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id:
        - power off
      sequence:
      - if:
        - condition: state
          entity_id: input_boolean.3dprinter_safety
          state: 'off'
          for:
            hours: 0
            minutes: 0
            seconds: 0
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.office_strip_socket_06
        else:
        - delay:
            hours: 0
            minutes: 0
            seconds: 1
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_power
    - conditions:
      - condition: trigger
        id:
        - t03
      sequence:
      - sequence:
        - delay:
            hours: 0
            minutes: 0
            seconds: 10
            milliseconds: 0
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.3dprinter_safety
  mode: parallel
  max: 10
- id: '1723652703682'
  alias: 3D Print Progress Notify
  description: ''
  triggers:
  - type: value
    device_id: 0b448651aeaffe49b475efc775e33180
    entity_id: 3932439c9f1b67fca8fca111146559f3
    domain: sensor
