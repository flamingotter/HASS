- id: '1723653511884'
  alias: 3D Print Chamber Fan
  description: ''
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    below: 64
    id: t01
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 65
    below: 75
    id: t02
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 76
    below: 85
    id: t03
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 86
    below: 95
    id: t04
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 96
    below: 105
    id: t05
  - platform: numeric_state
    entity_id:
    - sensor.bambu_p1s_chamber_air_temperature
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: 106
    id: t06
  - platform: state
    entity_id:
    - sensor.bambu_p1s_current_stage
    id: t07
    from:
    to: idle
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - t01
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 30
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t02
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 40
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t03
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 50
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t04
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 70
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t05
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 80
        target:
          entity_id: fan.bambu_p1s_chamber_fan
    - conditions:
      - condition: trigger
        id:
        - t06
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 100
        target:
          entity_id: fan.bambu_p1s_chamber_fan
      alias: Chamber Fan 100% > 106°F
    - conditions:
      - condition: trigger
        id:
        - t07
      sequence:
      - service: fan.set_percentage
        data:
          percentage: 0
        target:
          entity_id: fan.bambu_p1s_chamber_fan
      alias: Turn off Chamber Fan when Idle
  mode: single
