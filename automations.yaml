- id: '1772728212323'
  alias: 'Security: Front Porch - AI Video Analysis'
  description: ''
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_porch_ptz_person_detected
    to: 'on'
  - trigger: state
    entity_id: input_button.test_porch_ai
  conditions:
  - condition: state
    entity_id: input_boolean.camera_alerts
    state: 'on'
  - condition: template
    value_template: '{# If it has never triggered before, or if the time since last
      trigger is > 300 seconds, evaluate as True #} {{ this.attributes.last_triggered
      == None or (now() - this.attributes.last_triggered).total_seconds() > 300 }}

      '
  actions:
  - parallel:
    - action: camera.record
      target:
        entity_id: camera.front_porch_ptz_high_resolution_channel
      data:
        duration: 12
        lookback: 3
        filename: /media/snapshots/porch/approach.mp4
    - action: camera.record
      target:
        entity_id: camera.doorbell_outside_high_resolution_channel
      data:
        duration: 12
        lookback: 3
        filename: /media/snapshots/porch/dropoff.mp4
  - action: ai_task.generate_data
    data:
      entity_id: ai_task.google_ai_task
      task_name: Porch Video Analysis
      instructions: 'Attachment 1 and 2 are reference photos of the residents, MJ
        and Josh. Notice their distinctive arm tattoos. The remaining video attachments
        are current security footage. Ignore any vehicles or people in the distance.
        Compare the person in the footage to the reference photos.

        RULE 1: If the person in the footage is a visual match for Josh or MJ, start
        your response with the exact tag: [RESIDENT] RULE 2: If the person is a guest
        who is let inside the house or walks through the front door, start your response
        with: [ENTERED] RULE 3: For all other visitors, deliveries, or solicitors,
        start your response with: [ALERT]

        After the tag, provide a concise summary in under 50 words: - Person: [Details]
        - Package/Action: [What they left, or if they went inside] - Intent: [Delivery,
        Visitor, Solicitor, or Resident]

        '
      attachments:
      - media_content_id: media-source://media_source/local/snapshots/reference/mj.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/reference/josh.jpg
        media_content_type: image/jpeg
      - media_content_id: media-source://media_source/local/snapshots/porch/approach.mp4
        media_content_type: video/mp4
      - media_content_id: media-source://media_source/local/snapshots/porch/dropoff.mp4
        media_content_type: video/mp4
    response_variable: gemini_report
  - action: notify.send_message
    target:
      entity_id: notify.daily_camera_log
    data:
      message: '{{ now().strftime(''%I:%M %p'') }} - Front Porch: {{ gemini_report.data
        }}'
  - action: notify.send_message
    target:
      entity_id:
      - notify.porch_history
    data:
      message: '"{{ now().strftime(''%Y-%m-%d'') }}","{{ now().strftime(''%H:%M:%S'')
        }}","{{ gemini_report.data.split('']'')[0] ~ '']'' }}","{{ gemini_report.data
        | replace(''"'', ''""'') }}"

        '
  - if:
    - condition: template
      value_template: '{{ ''[ALERT]'' in gemini_report.data }}'
    then:
    - action: notify.persistent_notification
      data:
        title: Porch Intel (Full Report)
        message: '{{ gemini_report.data | replace(''[ALERT] '', '''') }}'
    - action: notify.mobile_app_josh_mobile
      data:
        title: Porch Intel
        message: '{{ gemini_report.data | replace(''[ALERT] '', '''') | truncate(150,
          true, ''...'') }}'
    - if:
      - condition: state
        entity_id: alarm_control_panel.home_alarm
        state:
        - armed_away
        - armed_vacation
      then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.porch_visitor_while_away
  mode: single
