        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: device_tracker_home
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Just Arrived
        action: input_select.select_option
    - conditions:
      - condition: or
        conditions:
        - condition: trigger
          id: input_select_wait_arrived
        - condition: trigger
          id: input_select_debounce
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Home
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: device_tracker_not_home
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Just Left
        action: input_select.select_option
    - conditions:
      - condition: trigger
        id: input_select_wait_left
      sequence:
      - target:
          entity_id: input_select.josh_status
        data:
          option: Away
        action: input_select.select_option
    default:
    - condition: trigger
      id: input_select_wait_away
    - target:
        entity_id: input_select.josh_status
      data:
        option: Extended Away
      action: input_select.select_option
