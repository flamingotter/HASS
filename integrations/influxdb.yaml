---
influxdb:
  api_version: 2
  ssl: false
  host: !secret influxdb_host
  port: 8086
  token: !secret influxdb_token
  organization: !secret influx_org
  bucket: homeassistant
  # tags:
  #   source: HomeAssistant
  # tags_attributes:
  #   - friendly_name
  default_measurement: units
  ignore_attributes:
    - icon
  include:
    # domains:
    #   - alarm_control_panel
    entity_globs:
      - sensor.szpffqlkc*
