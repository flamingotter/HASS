---
###what goes into database
recorder:  
  db_url: !secret ha_mariadb
  purge_keep_days: 60 
  exclude:
    domains:
      - sun
      - group
    entities:
      - sensor.date
      - sensor.time
      - sensor.time_date
      - sensor.date_time
      - sensor.time_utc
      - sensor.yr_symbol
      - sensor.internet_time