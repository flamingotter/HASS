---
binary_sensor:
  - name: "Trash Day"
    unique_id: trash_day_binary_sensor
    # Calculate the day name directly to avoid "missing sensor" errors
    state: >
      {% set days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'] %}
      {% set current_day = days[now().weekday()] %}
      {{ current_day == states('input_select.trash_pickup_day') }}
    icon: "{{ iif(this.state == 'on', 'mdi:delete', 'mdi:delete-empty') }}"