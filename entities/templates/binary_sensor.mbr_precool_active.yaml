---
binary_sensor:
  - name: "MBR Pre-Cooling Active"
    unique_id: mbr_precool_active
    state: >
      {% set b = states('input_datetime.bedroom_bedtime') %}
      {% set bedtime_str = b if b not in ['unknown', 'unavailable', 'None'] else '22:30:00' %}
      {% set bedtime = today_at(bedtime_str) %}
      
      {% set target = states('input_number.bedroom_target_temperature') | float(68) %}
      {% set indoor = states('sensor.bedroom_sensor_air_temperature') | float(target) %}
      {% set outdoor = states('sensor.weather_station_temperature_outdoor') | float(70) %}
      
      {# DATA-DRIVEN LOOKUP v5.0 #}
      {% set performance_data = states('input_text.mbr_cooling_performance_data') | from_json %}
      
      {# Round outdoor temp to nearest 5 for lookup #}
      {% set lookup_key = ((outdoor / 5) | round(0) * 5) | int | string %}
      
      {# Get rate from history, or default to 25 if not learned yet #}
      {% set base_rate = performance_data.get(lookup_key, 25) | float %}
      
      {% set delta = [0, indoor - target]|max %}
      {% set lead_min = (delta * base_rate) %}
      {% set start_ts = as_timestamp(bedtime, 0) - (lead_min * 60) %}
      
      {% set is_sleep_window = now() >= bedtime or now().hour < 7 %}
      {% set is_precool_window = as_timestamp(now(), 0) >= start_ts and now() < bedtime %}
      {% set is_cooling_mode = is_state('climate.t6_pro_downstairs', 'cool') %}
      
      {{ is_precool_window and not is_sleep_window and indoor > target and is_cooling_mode }}
    attributes:
      precool_start_time: >
        {% set b = states('input_datetime.bedroom_bedtime') %}
        {% set bedtime_str = b if b not in ['unknown', 'unavailable', 'None'] else '22:30:00' %}
        {% set bedtime = today_at(bedtime_str) %}
        {% set target = states('input_number.bedroom_target_temperature') | float(68) %}
        {% set indoor = states('sensor.bedroom_sensor_air_temperature') | float(target) %}
        {% set outdoor = states('sensor.weather_station_temperature_outdoor') | float(70) %}
        {% set performance_data = states('input_text.mbr_cooling_performance_data') | from_json %}
        {% set lookup_key = ((outdoor / 5) | round(0) * 5) | int | string %}
        {% set base_rate = performance_data.get(lookup_key, 25) | float %}
        {% set delta = [0, indoor - target]|max %}
        {% set lead_min = (delta * base_rate) %}
        {{ (as_timestamp(bedtime, 0) - (lead_min * 60)) | timestamp_custom('%H:%M:%S') }}
      observed_rate_used: >
        {% set outdoor = states('sensor.weather_station_temperature_outdoor') | float(70) %}
        {% set performance_data = states('input_text.mbr_cooling_performance_data') | from_json %}
        {% set lookup_key = ((outdoor / 5) | round(0) * 5) | int | string %}
        {{ performance_data.get(lookup_key, 25) }}
      target_temp: "{{ states('input_number.bedroom_target_temperature') }}"
      current_temp: "{{ states('sensor.bedroom_sensor_air_temperature') }}"
      hvac_mode: "{{ states('climate.t6_pro_downstairs') }}"
      bedtime_setting: "{{ states('input_datetime.bedroom_bedtime') }}"
