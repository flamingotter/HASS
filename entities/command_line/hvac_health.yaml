---
- sensor:
    name: "HVAC Health Status"
    unique_id: hvac_health_status
    command: "/config/bq_venv/bin/python3 /config/bin/hvac_health_check.py"
    value_template: "{{ value_json.status | title }}"
    json_attributes:
      - degradation_pct
      - baseline_rate
      - recent_rate
      - check_time
    scan_interval: 86400 # Runs once a day